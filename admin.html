<html lang="pt-BR">

    <meta charset="UTF-8">

    <title>Painel Admin - CatálogoZap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, deleteObject } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJaxRdA6uzbN41JvAw8xO7F5mzJaDfMBc",
            authDomain: "gen-lang-client-0664324166.firebaseapp.com",
            projectId: "gen-lang-client-0664324166",
            storageBucket: "gen-lang-client-0664324166.firebasestorage.app",
            messagingSenderId: "1074933311707",
            appId: "1:1074933311707:web:d841b61f84c05a40fc04fe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "ai-studio-2395f72f-4dac-4517-9681-c654cd1a03ca");
        const storage = getStorage(app);

        window.db = db;
        window.storage = storage;
        window.fs = { collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy, getDoc, setDoc };
        window.st = { ref, deleteObject };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <!-- Tela de Login -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl shadow-2xl border border-slate-100 w-full max-w-md space-y-6">
            <div class="text-center space-y-2">
                <div class="bg-slate-900 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="lock" class="text-white"></i>
                </div>
                <h1 class="text-2xl font-black uppercase italic tracking-tighter">Acesso Restrito</h1>
                <p class="text-slate-400 text-sm font-medium">Digite a senha mestra para entrar</p>
            </div>
            <div class="space-y-4">
                <input type="password" id="admin-password" placeholder="Sua senha secreta" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-slate-900 outline-none transition-all font-bold text-center tracking-widest">
                <button onclick="checkPassword()" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black uppercase italic tracking-widest hover:bg-slate-800 transition-all">Entrar no Painel</button>
            </div>
        </div>
    </div>

    <!-- Painel Principal -->
    <div id="admin-panel" class="hidden min-h-screen flex flex-col">
        <header class="bg-slate-900 border-b border-slate-800 sticky top-0 z-10 px-4">
            <div class="max-w-7xl mx-auto h-20 flex items-center justify-between">
                <div class="flex items-center gap-2 overflow-hidden">
                    <img src="https://i.postimg.cc/8cgHJgH8/catalogo.png" alt="CatálogoZap" class="h-10 sm:h-14 w-auto flex-shrink-0" referrerpolicy="no-referrer">
                    <span class="text-white/50 text-[8px] sm:text-[10px] font-bold uppercase tracking-widest ml-1 sm:ml-2 truncate">Painel Admin</span>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="logout()" class="p-2 sm:p-3 bg-red-500/10 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition-all flex items-center gap-2 font-black uppercase text-[10px] sm:text-xs tracking-widest shrink-0">
                        <i data-lucide="log-out" class="w-4 h-4 sm:w-5 sm:h-5"></i>
                        <span class="hidden sm:inline">Sair</span>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto w-full px-4 sm:px-6 py-6 sm:py-8 space-y-6">
            <div class="flex flex-col lg:flex-row lg:items-end justify-between gap-6">
                <div class="text-center lg:text-left">
                    <h2 class="text-3xl sm:text-4xl font-black uppercase italic tracking-tighter">Gerenciar Lojas</h2>
                    <p class="text-slate-500 font-medium text-sm">Controle de assinaturas e status dos clientes</p>
                </div>
                <div class="flex flex-col md:flex-row gap-3 w-full lg:w-auto">
                    <div class="relative flex-1 lg:w-72">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                        <input type="text" id="search-input" oninput="filterStores()" placeholder="Buscar loja, cliente ou zap..." class="w-full pl-11 pr-4 py-4 bg-white border border-slate-200 rounded-2xl sm:rounded-xl text-sm focus:outline-none focus:border-slate-900 shadow-sm font-bold">
                    </div>
                    
                    <div class="flex bg-white p-1 rounded-2xl border border-slate-200 shadow-sm overflow-x-auto no-scrollbar shrink-0">
                        <button onclick="renderStores(allStores)" class="px-5 py-3 rounded-xl font-black uppercase tracking-widest text-[9px] transition-all bg-slate-900 text-white shadow-lg whitespace-nowrap">Todas</button>
                        <button onclick="filterByStatus('active')" class="px-5 py-3 rounded-xl font-black uppercase tracking-widest text-[9px] transition-all text-slate-400 hover:text-slate-600 whitespace-nowrap">Ativas</button>
                        <button onclick="filterByStatus('expired')" class="px-5 py-3 rounded-xl font-black uppercase tracking-widest text-[9px] transition-all text-slate-400 hover:text-slate-600 whitespace-nowrap">Expiradas</button>
                    </div>

                    <button onclick="loadStores()" class="bg-white border border-slate-200 px-6 py-4 rounded-2xl sm:rounded-xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2 hover:bg-slate-50 shadow-sm active:scale-95 transition-all shrink-0">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i> <span class="hidden sm:inline">Atualizar</span>
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] sm:rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
                <!-- Desktop Table View (Scroll horizontal for tablets/small laptops) -->
                <div class="hidden md:block overflow-x-auto">
                    <div class="min-w-[1000px]">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-slate-50 border-b border-slate-100 uppercase tracking-tighter">
                                    <th class="px-6 py-5 text-[10px] font-black tracking-widest text-slate-400">Loja / Cliente</th>
                                    <th class="px-6 py-5 text-[10px] font-black tracking-widest text-slate-400">WhatsApp</th>
                                    <th class="px-6 py-5 text-[10px] font-black tracking-widest text-slate-400 text-center">Status</th>
                                    <th class="px-6 py-5 text-[10px] font-black tracking-widest text-slate-400 text-center">Plano</th>
                                    <th class="px-6 py-5 text-[10px] font-black tracking-widest text-slate-400 text-center">Vendedores</th>
                                    <th class="px-6 py-5 text-[10px] font-black tracking-widest text-slate-400 text-center">Visitas</th>
                                    <th class="px-6 py-5 text-[10px] font-black tracking-widest text-slate-400">Expiração / Senha</th>
                                    <th class="px-6 py-5 text-[10px] font-black tracking-widest text-slate-400 text-right">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="stores-table-body">
                                <!-- Lojas serão carregadas aqui -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Mobile Card View -->
                <div id="stores-mobile-list" class="md:hidden divide-y divide-slate-100">
                    <!-- Lojas mobile serão carregadas aqui -->
                </div>

                <div id="loading-indicator" class="p-12 text-center hidden">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-slate-900 mx-auto"></div>
                </div>
                <div id="empty-state" class="p-12 text-center hidden">
                    <p class="text-slate-400 font-medium">Nenhuma loja encontrada no banco de dados.</p>
                </div>
            </div>
        </main>

        <footer class="py-8 px-6 border-t border-slate-200 mt-auto">
            <div class="max-w-6xl mx-auto text-center">
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Desenvolvido por Bossa Infor</p>
            </div>
        </footer>
    </div>

    <script>
        const ADMIN_PASSWORD = "13259898Aa#@";
        let allStores = [];

        function checkPassword() {
            const input = document.getElementById('admin-password').value;
            if (input === ADMIN_PASSWORD) {
                localStorage.setItem('admin_logged', 'true');
                showPanel();
            } else {
                alert("Senha incorreta! Tente novamente.");
            }
        }

        function logout() {
            localStorage.removeItem('admin_logged');
            location.reload();
        }

        function showPanel() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            loadStores();
            lucide.createIcons();
        }

        async function loadStores() {
            const tbody = document.getElementById('stores-table-body');
            const mobileList = document.getElementById('stores-mobile-list');
            const loader = document.getElementById('loading-indicator');
            const empty = document.getElementById('empty-state');

            tbody.innerHTML = '';
            mobileList.innerHTML = '';
            loader.classList.remove('hidden');
            empty.classList.add('hidden');

            try {
                // Aguarda o Firebase/fs estar disponível
                let attempts = 0;
                while ((!window.db || !window.fs) && attempts < 150) {
                    await new Promise(r => setTimeout(r, 100));
                    attempts++;
                }

                if (!window.db || !window.fs) {
                    throw new Error("Serviços do Firebase não inicializados (Rede lenta).");
                }

                console.log("Iniciando busca de lojas no Firestore...");
                const q = window.fs.query(window.fs.collection(window.db, "stores"));
                const querySnapshot = await window.fs.getDocs(q);
                
                console.log(`Lojas carregadas com sucesso: ${querySnapshot.size}`);
                loader.classList.add('hidden');

                if (querySnapshot.empty) {
                    console.warn("Nenhuma loja encontrada na coleção 'stores'.");
                    empty.classList.remove('hidden');
                    return;
                }

                allStores = [];
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    allStores.push({ id: docSnap.id, ...data });
                });
                console.log("Total de lojas processadas:", allStores.length);

                // Ordenação manual: mais recentes primeiro se houver createdAt
                allStores.sort((a, b) => {
                    const dateA = a.createdAt ? new Date(a.createdAt).getTime() : 0;
                    const dateB = b.createdAt ? new Date(b.createdAt).getTime() : 0;
                    return dateB - dateA;
                });

                renderStores(allStores);
            } catch (error) {
                console.error("Erro ao carregar lojas:", error);
                alert("Erro ao carregar dados do Firebase.");
            }
        }

        function filterStores() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allStores.filter(s => 
                (s.n && s.n.toLowerCase().includes(term)) || 
                (s.cn && s.cn.toLowerCase().includes(term)) ||
                (s.w && s.w.includes(term)) ||
                (s.id && s.id.toLowerCase().includes(term))
            );
            renderStores(filtered);
        }

        window.filterByStatus = function(status) {
            let filtered = [];
            if (status === 'active') {
                filtered = allStores.filter(s => {
                    const expiresAt = new Date(s.expiresAt || s.createdAt);
                    return s.status !== 'blocked' && new Date() <= expiresAt;
                });
            } else if (status === 'expired') {
                filtered = allStores.filter(s => {
                    const expiresAt = new Date(s.expiresAt || s.createdAt);
                    return s.status === 'blocked' || new Date() > expiresAt;
                });
            }
            renderStores(filtered);
        }

        function renderStores(stores) {
            const tbody = document.getElementById('stores-table-body');
            const mobileList = document.getElementById('stores-mobile-list');
            const empty = document.getElementById('empty-state');

            tbody.innerHTML = '';
            mobileList.innerHTML = '';

            if (stores.length === 0) {
                empty.classList.remove('hidden');
                return;
            } else {
                empty.classList.add('hidden');
            }

            // Conta ocorrências de cada número para detectar duplicatas
            const whatsappCounts = {};
            stores.forEach(s => {
                const w = s.w ? s.w.replace(/\D/g, '') : '';
                if (w) whatsappCounts[w] = (whatsappCounts[w] || 0) + 1;
            });

            stores.forEach((data) => {
                const id = data.id;
                const whatsappClean = data.w ? data.w.replace(/\D/g, '') : '';
                const isDuplicate = whatsappCounts[whatsappClean] > 1;
                const expiresAt = new Date(data.expiresAt || data.createdAt);
                const isExpired = new Date() > expiresAt;
                
                let statusBadge = '';
                let statusColor = '';
                if (data.status === 'blocked') {
                    statusColor = 'red';
                    statusBadge = '<span class="bg-red-100 text-red-600 px-2 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">Bloqueado</span>';
                } else if (isExpired && data.status === 'trial') {
                    statusColor = 'orange';
                    statusBadge = '<span class="bg-orange-100 text-orange-600 px-2 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">Teste Expirado</span>';
                } else if (data.status === 'trial') {
                    statusColor = 'blue';
                    statusBadge = '<span class="bg-blue-100 text-blue-600 px-2 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">Em Teste</span>';
                } else {
                    statusColor = 'green';
                    statusBadge = '<span class="bg-green-100 text-green-600 px-2 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">Ativo</span>';
                }

                const plan = data.plan || 'free';
                let planBadge = '';
                let planIconAction = 'award';
                let planColorClass = 'text-slate-400 bg-slate-50';

                if (plan === 'premium') {
                    planBadge = '<span class="bg-indigo-100 text-indigo-600 px-2 py-1 rounded-full text-[9px] font-black uppercase tracking-widest flex items-center gap-1"><i data-lucide="star" class="w-2.5 h-2.5 fill-current"></i> Premium</span>';
                    planIconAction = 'star';
                    planColorClass = 'text-indigo-600 bg-indigo-50';
                } else if (plan === 'basic') {
                    planBadge = '<span class="bg-blue-100 text-blue-600 px-2 py-1 rounded-full text-[9px] font-black uppercase tracking-widest flex items-center gap-1"><i data-lucide="zap" class="w-2.5 h-2.5 fill-current"></i> Básico</span>';
                    planIconAction = 'zap';
                    planColorClass = 'text-blue-600 bg-blue-50';
                } else {
                    planBadge = '<span class="bg-slate-100 text-slate-500 px-2 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">Free</span>';
                    planIconAction = 'award';
                    planColorClass = 'text-slate-400 bg-slate-50';
                }

                const vendors = data.v || [];
                const vendorCount = vendors.length;

                // Desktop Row
                const row = document.createElement('tr');
                row.className = "border-b border-slate-50 hover:bg-slate-50/50 transition-colors";
                
                let waClean = data.w ? data.w.replace(/\D/g, '') : '';
                if (waClean.length <= 11 && waClean.length > 0) waClean = '55' + waClean;
                const waLink = `https://wa.me/${waClean}`;

                row.innerHTML = `
                    <td class="px-6 py-5">
                        <div class="font-black text-sm text-slate-900 uppercase italic tracking-tighter">${data.n || 'Sem Nome'}</div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${data.cn || 'Dono não informado'}</div>
                    </td>
                    <td class="px-6 py-5">
                        <a href="${waLink}" target="_blank" class="text-xs font-black text-slate-600 hover:text-green-500 flex items-center gap-1 transition-colors">
                            <i data-lucide="phone" class="w-3 h-3 text-green-500"></i> ${data.w || '-'}
                        </a>
                        ${isDuplicate ? '<div class="text-[8px] text-orange-500 font-black uppercase mt-1 flex items-center gap-1"><i data-lucide="alert-triangle" class="w-2 h-2"></i> Repetido</div>' : ''}
                    </td>
                    <td class="px-6 py-5 text-center">
                        ${statusBadge}
                    </td>
                    <td class="px-6 py-5 text-center">
                        ${planBadge}
                    </td>
                    <td class="px-6 py-5 text-center">
                        <button onclick="showVendors('${id}')" class="text-xs font-black ${vendorCount > 0 ? 'text-indigo-600' : 'text-slate-400'} hover:text-blue-600 flex items-center justify-center gap-1 mx-auto transition-all">
                            <i data-lucide="users" class="w-3.5 h-3.5"></i> ${vendorCount} Vendedores
                        </button>
                    </td>
                    <td class="px-6 py-5 text-center text-xs font-black text-slate-900">
                        ${data.clicks || 0}
                    </td>
                    <td class="px-6 py-5">
                        <div class="text-xs font-bold ${isExpired ? 'text-red-500' : 'text-slate-600'}">
                            ${expiresAt.toLocaleDateString('pt-BR')}
                        </div>
                        <div class="inline-flex items-center gap-1.5 px-2 py-1 bg-blue-50 border border-blue-100 rounded-lg text-[9px] text-blue-600 font-black uppercase tracking-widest mt-1">
                            <i data-lucide="key" class="w-2.5 h-2.5"></i> ${data.password || 'SEM SENHA'}
                        </div>
                        <div class="text-[8px] text-slate-400 font-medium uppercase tracking-widest block mt-0.5">ID: ${id}</div>
                    </td>
                    <td class="px-6 py-5 text-right">
                        <div class="flex items-center justify-end gap-2">
                            <button onclick="setAppLink('${id}')" title="Link do Aplicativo" class="p-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition-colors">
                                <i data-lucide="smartphone" size="16"></i>
                            </button>
                            <button onclick="changeStoreId('${id}')" title="Mudar ID (Link)" class="p-2 bg-yellow-50 text-yellow-600 rounded-lg hover:bg-yellow-100 transition-colors">
                                <i data-lucide="tag" size="16"></i>
                            </button>
                            <button onclick="editStoreInfo('${id}')" title="Editar Info Básica" class="p-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-blue-50 hover:text-blue-600 transition-colors">
                                <i data-lucide="settings" size="16"></i>
                            </button>
                            <button onclick="cloneStore('${id}')" title="Clonar Loja" class="p-2 bg-indigo-50 text-indigo-600 rounded-lg hover:bg-indigo-100 transition-colors">
                                <i data-lucide="copy" size="16"></i>
                            </button>
                            <button onclick="activateStore('${id}', '${data.expiresAt}')" title="Ativar +30 dias" class="p-2 bg-green-50 text-green-600 rounded-lg hover:bg-green-100 transition-colors">
                                <i data-lucide="calendar-plus" size="16"></i>
                            </button>
                            <button onclick="togglePlan('${id}', '${plan}')" title="Ciclar Plano (Free > Basic > Premium)" class="p-2 ${planColorClass} rounded-lg hover:shadow-md transition-all">
                                <i data-lucide="${planIconAction}" size="16" class="${plan === 'free' ? '' : 'fill-current'}"></i>
                            </button>
                            <button onclick="blockStore('${id}')" title="${data.status === 'blocked' ? 'Desbloquear' : 'Bloquear'}" class="p-2 ${data.status === 'blocked' ? 'bg-green-50 text-green-600 hover:bg-green-100' : 'bg-orange-50 text-orange-600 hover:bg-orange-100'} rounded-lg transition-colors">
                                <i data-lucide="${data.status === 'blocked' ? 'unlock' : 'lock'}" size="16"></i>
                            </button>
                            <button onclick="deleteStore('${id}')" title="Excluir" class="p-2 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition-colors">
                                <i data-lucide="trash-2" size="16"></i>
                            </button>
                            <button onclick="copyEditLink('${id}')" title="Copiar Link de Edição" class="p-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition-colors">
                                <i data-lucide="link-2" size="16"></i>
                            </button>
                            <a href="loja.html?id=${id}" target="_blank" title="Ver Loja" class="p-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 transition-colors">
                                <i data-lucide="eye" size="16"></i>
                            </a>
                        </div>
                    </td>
                `;
                tbody.appendChild(row);

                // Mobile Card
                const card = document.createElement('div');
                card.className = "p-5 sm:p-6 space-y-5";
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-black text-base text-slate-900 uppercase italic tracking-tighter">${data.n || 'Sem Nome'}</div>
                            <div class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">${data.cn || 'Dono não informado'}</div>
                        </div>
                        <div class="flex flex-col items-end gap-1.5">
                            ${statusBadge}
                            ${planBadge}
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-4 text-xs">
                        <div class="bg-slate-50/50 p-3 rounded-2xl border border-slate-100">
                            <div class="text-slate-400 uppercase font-black text-[9px] tracking-widest mb-1.5">WhatsApp</div>
                            <a href="${waLink}" target="_blank" class="font-black text-slate-800 flex items-center gap-1 hover:text-green-500 transition-colors">
                                <i data-lucide="phone" class="w-3 h-3 text-green-500"></i> ${data.w || '-'}
                            </a>
                            ${isDuplicate ? '<div class="text-[8px] text-orange-500 font-black uppercase mt-1 flex items-center gap-1"><i data-lucide="alert-triangle" class="w-2 h-2"></i> Repetido</div>' : ''}
                        </div>
                        <div class="bg-slate-50/50 p-3 rounded-2xl border border-slate-100">
                            <div class="text-slate-400 uppercase font-black text-[9px] tracking-widest mb-1.5">Métricas</div>
                            <div class="font-black text-slate-900 flex items-center gap-1">
                                <i data-lucide="eye" class="w-3 h-3 text-slate-400"></i> ${data.clicks || 0} Visitas
                            </div>
                        </div>
                        <div class="bg-slate-50/50 p-3 rounded-2xl border border-slate-100">
                            <div class="text-slate-400 uppercase font-black text-[9px] tracking-widest mb-1.5">Expiração</div>
                            <div class="font-black ${isExpired ? 'text-red-500' : 'text-slate-800'}">${expiresAt.toLocaleDateString('pt-BR')}</div>
                        </div>
                        <div class="bg-blue-50/50 p-3 rounded-2xl border border-blue-100 shadow-sm">
                            <div class="text-blue-400 uppercase font-black text-[9px] tracking-widest mb-1.5">Senha de Acesso</div>
                            <div class="font-black text-blue-600 flex items-center gap-1">
                                <i data-lucide="key" class="w-3 h-3"></i> ${data.password || '---'}
                            </div>
                        </div>
                    </div>

                    <div class="space-y-3 pt-2">
                        <div class="flex items-center gap-2 w-full">
                            <button onclick="activateStore('${id}', '${data.expiresAt}')" class="flex-1 py-3 bg-green-500 text-white rounded-xl font-black uppercase text-[10px] tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all shadow-md shadow-green-100/50">
                                <i data-lucide="calendar-plus" class="w-3.5 h-3.5"></i> Ativar
                            </button>
                            <button onclick="togglePlan('${id}', '${plan}')" class="flex-1 py-3 bg-slate-900 text-white rounded-xl font-black uppercase text-[10px] tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all">
                                 <i data-lucide="${planIconAction}" class="w-3.5 h-3.5 ${plan === 'free' ? '' : 'fill-current'}"></i> Plano
                            </button>
                        </div>
                        <div class="flex items-center gap-2 w-full">
                            <button onclick="showVendors('${id}')" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-black uppercase text-[10px] tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all shadow-md shadow-indigo-100/50">
                                <i data-lucide="users" class="w-3.5 h-3.5"></i> Vend. (${vendorCount})
                            </button>
                            <button onclick="blockStore('${id}')" class="flex-1 py-3 ${data.status === 'blocked' ? 'bg-green-50 text-green-600 border-green-100' : 'bg-orange-50 text-orange-600 border-orange-100'} rounded-xl font-black uppercase text-[10px] tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all border shadow-sm">
                                <i data-lucide="${data.status === 'blocked' ? 'unlock' : 'lock'}" class="w-3.5 h-3.5"></i> ${data.status === 'blocked' ? 'Desbl' : 'Bloq'}
                            </button>
                        </div>
                        <div class="flex items-center gap-2 w-full pt-1">
                            <button onclick="setAppLink('${id}')" class="flex-1 py-3 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center active:scale-95 transition-all border border-blue-100" title="Link do App">
                                <i data-lucide="smartphone" class="w-4 h-4"></i>
                            </button>
                            <button onclick="changeStoreId('${id}')" class="flex-1 py-3 bg-yellow-50 text-yellow-600 rounded-xl flex items-center justify-center active:scale-95 transition-all border border-yellow-100" title="Mudar ID (Link)">
                                <i data-lucide="tag" class="w-4 h-4"></i>
                            </button>
                            <button onclick="editStoreInfo('${id}')" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl flex items-center justify-center active:scale-95 transition-all border border-slate-200" title="Editar Info">
                                <i data-lucide="settings" class="w-4 h-4"></i>
                            </button>
                            <button onclick="cloneStore('${id}')" class="flex-1 py-3 bg-indigo-50 text-indigo-600 rounded-xl flex items-center justify-center active:scale-95 transition-all border border-indigo-100" title="Clonar">
                                <i data-lucide="copy" class="w-4 h-4"></i>
                            </button>
                            <button onclick="copyEditLink('${id}')" class="flex-1 py-3 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center active:scale-95 transition-all border border-blue-100" title="Copiar Link">
                                <i data-lucide="link-2" class="w-4 h-4"></i>
                            </button>
                            <a href="loja.html?id=${id}" target="_blank" class="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl flex items-center justify-center active:scale-95 transition-all border border-slate-200" title="Ver Loja">
                                <i data-lucide="eye" class="w-4 h-4"></i>
                            </a>
                            <button onclick="deleteStore('${id}')" class="flex-1 py-3 bg-red-50 text-red-600 rounded-xl flex items-center justify-center active:scale-95 transition-all border border-red-100" title="Excluir">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </div>
                    <div class="text-[8px] text-slate-400 font-bold uppercase tracking-widest text-center">ID: ${id}</div>
                `;
                mobileList.appendChild(card);
            });
            lucide.createIcons();
        }

        async function activateStore(id, currentExpires) {
            if (!confirm("Deseja ativar/renovar esta loja por mais 30 dias?")) return;
            
            try {
                const now = new Date();
                const current = new Date(currentExpires || now);
                const baseDate = current > now ? current : now;
                const newExpires = new Date(baseDate.getTime() + 30 * 24 * 60 * 60 * 1000);
                
                await window.fs.updateDoc(window.fs.doc(window.db, "stores", id), {
                    status: "active",
                    expiresAt: newExpires.toISOString()
                });
                
                alert("Loja ativada com sucesso!");
                loadStores();
            } catch (error) {
                alert("Erro ao atualizar status.");
            }
        }

        async function togglePlan(id, currentPlan) {
            const plans = ['free', 'basic', 'premium'];
            const currentIndex = plans.indexOf(currentPlan);
            const nextPlan = plans[(currentIndex + 1) % plans.length];
            
            if (!confirm(`Deseja alterar o plano desta loja para ${nextPlan.toUpperCase()}?`)) return;
            
            try {
                await window.fs.updateDoc(window.fs.doc(window.db, "stores", id), {
                    plan: nextPlan
                });
                alert("Plano atualizado com sucesso!");
                loadStores();
            } catch (error) {
                alert("Erro ao atualizar plano.");
            }
        }

        function showVendors(storeId) {
            const store = allStores.find(s => s.id === storeId);
            if (!store) return;
            
            const vendors = store.v || [];
            const modal = document.createElement('div');
            modal.id = 'vendors-modal';
            modal.className = 'fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-6';
            modal.innerHTML = `
                <div class="bg-white w-full max-w-lg rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[80vh]">
                    <div class="p-6 bg-slate-900 text-white flex items-center justify-between">
                        <div>
                            <h3 class="font-black uppercase italic tracking-tighter text-xl">Vendedores</h3>
                            <p class="text-xs text-white/50 font-bold uppercase tracking-widest">${store.n || 'Loja'}</p>
                        </div>
                        <button onclick="document.getElementById('vendors-modal').remove()" class="text-white/50 hover:text-white transition-colors">
                            <i data-lucide="x"></i>
                        </button>
                    </div>
                    <div class="p-6 overflow-y-auto space-y-4">
                        ${vendors.length === 0 ? '<p class="text-center text-slate-400 py-8">Nenhum vendedor cadastrado.</p>' : vendors.map(v => `
                            <div class="bg-slate-50 p-4 rounded-2xl flex items-center justify-between border border-slate-100">
                                <div>
                                    <div class="font-black text-slate-800 uppercase italic tracking-tighter">${v.name}</div>
                                    <div class="text-[9px] text-slate-400 font-bold uppercase tracking-widest">${v.code}</div>
                                </div>
                                <div class="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">
                                    ${v.clicks || 0} Cliques
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="p-6 border-t border-slate-100">
                         <button onclick="document.getElementById('vendors-modal').remove()" class="w-full py-4 bg-slate-100 text-slate-600 rounded-2xl font-black uppercase tracking-widest text-xs hover:bg-slate-200 transition-all">Fechar</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            lucide.createIcons();
        }

        async function blockStore(id) {
            const store = allStores.find(s => s.id === id);
            if (!store) return;
            
            const isBlocked = store.status === 'blocked';
            const actionLabel = isBlocked ? "desbloquear" : "bloquear";
            const newStatus = isBlocked ? "active" : "blocked";
            
            if (!confirm(`Deseja ${actionLabel} o acesso a esta loja?`)) return;
            
            try {
                await window.fs.updateDoc(window.fs.doc(window.db, "stores", id), {
                    status: newStatus
                });
                alert(`Loja ${isBlocked ? 'desbloqueada' : 'bloqueada'}!`);
                loadStores();
            } catch (error) {
                alert(`Erro ao ${actionLabel}.`);
            }
        }

        async function deleteStore(id) {
            if (!confirm("TEM CERTEZA ABSOLUTA? Esta ação é irreversível e apagará DEFINITIVAMENTE todos os dados da loja, contatos, banners, logos, histórico de trial e qualquer vínculo com o WhatsApp!")) return;
            
            try {
                const { doc, deleteDoc, getDoc, collection, getDocs } = window.fs;
                const { ref, deleteObject } = window.st;
                const storeRef = doc(window.db, "stores", id);
                
                let phoneFromStore = null;
                const snap = await getDoc(storeRef);
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.w) {
                        phoneFromStore = data.w.replace(/\D/g, '');
                    }
                    
                    // Tentar apagar o banner do Storage se houver
                    if (data.bi && data.bi.includes('firebasestorage')) {
                        try { await deleteObject(ref(window.storage, `stores/${id}/banner`)); } catch(e){}
                    }
                    // Tentar apagar o logo do Storage se houver
                    if (data.lg && data.lg.includes('firebasestorage')) {
                        try { await deleteObject(ref(window.storage, `stores/${id}/logo`)); } catch(e){}
                    }
                }

                // 1. Apagar TODOS os registros na coleção "trial_history" que possuam esse storeId
                try {
                    const allHistSnap = await getDocs(collection(window.db, "trial_history"));
                    allHistSnap.forEach(async (hDoc) => {
                        const hData = hDoc.data();
                        if (hData.storeId === id) {
                            try {
                                await deleteDoc(doc(window.db, "trial_history", hDoc.id));
                                console.log("Histórico de trial removido via associação de storeId:", hDoc.id);
                            } catch(errH){}
                        }
                    });
                } catch(eQuery) {
                    console.error("Erro ao varrer trial_history:", eQuery);
                }

                // 2. Apagar diretamente pelo telefone cadastrado na loja (como garantia adicional)
                if (phoneFromStore) {
                    try {
                        await deleteDoc(doc(window.db, "trial_history", phoneFromStore));
                        console.log("Histórico de trial removido diretamente via telefone:", phoneFromStore);
                    } catch(e){}
                    
                    // Tenta com e sem código de país '55' para abranger todos os cadastros legados
                    let altPhone = phoneFromStore;
                    if (phoneFromStore.startsWith('55') && phoneFromStore.length > 10) {
                        altPhone = phoneFromStore.substring(2);
                    } else {
                        altPhone = '55' + phoneFromStore;
                    }
                    try { await deleteDoc(doc(window.db, "trial_history", altPhone)); } catch(e){}
                }

                // 3. Remover o documento da loja principal
                await deleteDoc(storeRef);
                
                alert("Sucesso! Loja, contatos, mídias e histórico de trial excluídos de forma definitiva de todo o sistema.");
                loadStores();
            } catch (error) {
                console.error("Erro ao excluir:", error);
                alert("Erro ao excluir: " + (error.message || error));
            }
        }

        async function editStoreInfo(id) {
            const store = allStores.find(s => s.id === id);
            if (!store) return;

            const newName = prompt("Novo Nome da Loja:", store.n || "");
            if (newName === null) return;

            const newOwner = prompt("Nome do Responsável:", store.cn || "");
            if (newOwner === null) return;

            const newWhatsApp = prompt("Novo WhatsApp (apenas números com DDD):", store.w || "");
            if (newWhatsApp === null) return;

            const whatsappClean = newWhatsApp.replace(/\D/g, '');
            if (whatsappClean.length < 10) {
                alert("WhatsApp inválido.");
                return;
            }

            try {
                const { doc, updateDoc, setDoc, deleteDoc } = window.fs;
                
                // 1. Atualizar a loja
                await updateDoc(doc(window.db, "stores", id), {
                    n: newName,
                    cn: newOwner,
                    w: whatsappClean
                });

                // 2. Migrar histórico de trial (login)
                if (store.w !== whatsappClean) {
                    // Remove o antigo
                    try { await deleteDoc(doc(window.db, "trial_history", store.w.replace(/\D/g, ''))); } catch(e){}
                    // Cria o novo
                    await setDoc(doc(window.db, "trial_history", whatsappClean), {
                        storeId: id,
                        createdAt: store.createdAt || new Date().toISOString()
                    });
                }

                alert("Informações atualizadas com sucesso!");
                loadStores();
            } catch (e) {
                console.error(e);
                alert("Erro ao atualizar informações.");
            }
        }

        async function setAppLink(id) {
            const store = allStores.find(s => s.id === id);
            if (!store) return;

            const currentLink = store.al || "";
            const newLink = prompt(`LINK DO APLICATIVO (Kodular/APK/Store)\nLoja: ${store.n}\nDigite o link para download do app:`, currentLink);
            
            if (newLink === null) return; // Cancelou

            try {
                await window.fs.updateDoc(window.fs.doc(window.db, "stores", id), {
                    al: newLink.trim()
                });
                alert("Link do aplicativo atualizado!");
                loadStores();
            } catch (e) {
                console.error("Erro ao salvar link do app:", e);
                alert("Erro ao salvar link.");
            }
        }

        async function changeStoreId(oldId) {
            const store = allStores.find(s => s.id === oldId);
            if (!store) return;

            const newId = prompt(`MUDAR LINK (SLUG)\nID atual: ${oldId}\nDigite o novo ID desejado (ex: revenda-carros):`, oldId);
            if (!newId || newId === oldId) return;

            const slugClean = newId.toLowerCase().trim().replace(/[^a-z0-9-]/g, '');
            if (!slugClean) {
                alert("ID inválido! Use apenas letras, números e traços.");
                return;
            }

            if (!confirm(`TEM CERTEZA?\nIsso vai mudar o link da loja de:\n/loja.html?id=${oldId}\nPara:\n/loja.html?id=${slugClean}\n\nO link antigo deixará de funcionar!`)) return;

            try {
                const { doc, getDoc, setDoc, deleteDoc, updateDoc } = window.fs;
                
                // 1. Verificar se novo ID já existe
                const check = await getDoc(doc(window.db, "stores", slugClean));
                if (check.exists()) {
                    alert("Este ID (LINK) já está em uso por outra loja. Escolha outro.");
                    return;
                }

                // 2. Criar novo documento com mesmíssimas informações
                const data = { ...store };
                delete data.id; // Remove o ID do objeto de dados

                // Sanitização para cumprir as regras atuais do Firestore (isValidStore)
                if (typeof data.n !== 'string') data.n = String(data.n || 'Loja sem nome');
                if (typeof data.w !== 'string') data.w = String(data.w || '85999999999');
                if (!['trial', 'active', 'blocked'].includes(data.status)) data.status = 'active';
                if (typeof data.expiresAt !== 'string') {
                    // Garantir que expiresAt seja uma string ISO
                    if (data.expiresAt && data.expiresAt.toDate) {
                        data.expiresAt = data.expiresAt.toDate().toISOString();
                    } else if (data.expiresAt instanceof Date) {
                        data.expiresAt = data.expiresAt.toISOString();
                    } else {
                        data.expiresAt = new Date().toISOString();
                    }
                }
                
                console.log("Tentando criar nova loja com ID:", slugClean, data);
                await setDoc(doc(window.db, "stores", slugClean), data);

                // 3. Atualizar trial_history (login via whatsapp) se existir - OPCIONAL
                if (store.w) {
                    try {
                        const whatsappClean = store.w.replace(/\D/g, '');
                        const historyRef = doc(window.db, "trial_history", whatsappClean);
                        const historySnap = await getDoc(historyRef);
                        if (historySnap.exists() && historySnap.data().storeId === oldId) {
                            await updateDoc(historyRef, { storeId: slugClean });
                        }
                    } catch (eHistory) {
                        console.warn("Aviso: Falha ao atualizar histórico de trial, mas a loja foi movida:", eHistory);
                    }
                }

                // 4. Apagar ID antigo
                await deleteDoc(doc(window.db, "stores", oldId));

                alert("ID (Link) alterado com sucesso!");
                loadStores();
            } catch (e) {
                console.error("Erro ao mudar ID:", e);
                alert("Erro ao processar mudança de ID: " + (e.message || e));
            }
        }

        async function cloneStore(id) {
            const source = allStores.find(s => s.id === id);
            if (!source) return;

            if (!confirm(`Deseja clonar a loja "${source.n}"? Uma nova loja será criada com os mesmos produtos e configurações.`)) return;

            const newSlug = prompt("Digite o ID (SLUG) da nova loja (ex: petshop-centro):", "");
            if (!newSlug) return;
            const slugClean = newSlug.toLowerCase().trim().replace(/[^a-z0-9-]/g, '');

            try {
                const { doc, getDoc, setDoc } = window.fs;
                
                // Verificar se o ID já existe
                const check = await getDoc(doc(window.db, "stores", slugClean));
                if (check.exists()) {
                    alert("Este ID (SLUG) já está em uso. Escolha outro.");
                    return;
                }

                const cloneData = {
                    ...source,
                    n: source.n + " (CLONE)",
                    clicks: 0,
                    createdAt: new Date().toISOString(),
                    expiresAt: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString(), // 7 dias de teste
                    status: 'trial',
                    v: [] // Limpa vendedores
                };
                delete cloneData.id; // Remove o ID do objeto de dados

                await setDoc(doc(window.db, "stores", slugClean), cloneData);
                
                alert(`Loja clonada com sucesso! Novo ID: ${slugClean}\nLembre-se de configurar o WhatsApp da nova loja.`);
                loadStores();
            } catch (e) {
                console.error(e);
                alert("Erro ao clonar loja.");
            }
        }

        window.copyEditLink = function(id) {
            const baseUrl = window.location.href.split('admin.html')[0];
            const editUrl = `${baseUrl}criar.html?edit=${id}`;
            navigator.clipboard.writeText(editUrl);
            alert("Link de edição copiado para a área de transferência!");
        }

        window.onload = () => {
            if (localStorage.getItem('admin_logged') === 'true') {
                showPanel();
            }
            lucide.createIcons();
        };
    </script>
</body>
</html>
