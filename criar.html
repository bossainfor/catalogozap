<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar meu CatálogoZap - Bossa Infor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJaxRdA6uzbN41JvAw8xO7F5mzJaDfMBc",
            authDomain: "gen-lang-client-0664324166.firebaseapp.com",
            projectId: "gen-lang-client-0664324166",
            storageBucket: "gen-lang-client-0664324166.firebasestorage.app",
            messagingSenderId: "1074933311707",
            appId: "1:1074933311707:web:d841b61f84c05a40fc04fe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "ai-studio-2395f72f-4dac-4517-9681-c654cd1a03ca");

        window.db = db;
        window.fs = { doc, setDoc, getDoc, deleteDoc };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 1.5rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <!-- MODAL DE VÍDEO -->
    <div id="video-modal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] hidden items-center justify-center p-4" onclick="closeTutorial()">
        <div class="bg-slate-800 w-full max-w-4xl rounded-[2.5rem] overflow-hidden shadow-2xl relative border border-white/10" onclick="event.stopPropagation()">
            <button onclick="closeTutorial()" class="absolute top-6 right-6 bg-white/10 hover:bg-white/20 text-white p-3 rounded-full z-20 backdrop-blur-xl transition-all">
                <i data-lucide="x"></i>
            </button>
            <div class="video-container">
                <iframe id="tutorial-iframe" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <header class="bg-white border-b border-slate-200 sticky top-0 z-10 px-4">
        <div class="max-w-4xl mx-auto h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-orange-500 p-2 rounded-lg"><i data-lucide="shopping-bag" class="text-white w-5 h-5"></i></div>
                <h1 class="text-xl font-bold tracking-tight">CatálogoZap</h1>
            </div>
            <div class="flex gap-2 items-center">
                <!-- BOTÃO EDITAR ÚLTIMA (AQUI ESTÁ O QUE VOCÊ PEDIU) -->
                <div id="last-store-container" class="hidden">
                    <button onclick="editLastStore()" class="bg-orange-100 text-orange-600 px-3 py-2 rounded-xl text-[10px] font-bold hover:bg-orange-200 flex items-center gap-1">
                        <i data-lucide="history" class="w-3 h-3"></i> Editar Última
                    </button>
                </div>
                <button onclick="window.open('https://postimages.org/', '_blank')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold hover:bg-blue-700">
                    <i data-lucide="upload-cloud" class="w-3 h-3"></i> Postimages
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8 pb-32">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <button onclick="openTutorial('6xh3jsLYXRQ')" class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex items-center gap-5 hover:shadow-xl hover:-translate-y-1 transition-all group text-left">
                <div class="bg-slate-900 p-4 rounded-2xl text-white group-hover:bg-orange-500 transition-colors shadow-lg">
                    <i data-lucide="monitor" class="w-6 h-6"></i>
                </div>
                <div>
                    <h3 class="font-black uppercase italic tracking-tighter text-lg">Tutorial PC</h3>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Aprenda a criar pelo computador</p>
                </div>
                <div class="ml-auto text-slate-200 group-hover:text-orange-500 transition-colors">
                    <i data-lucide="play-circle" class="w-8 h-8"></i>
                </div>
            </button>
            <button onclick="openTutorial('kxdfDO0ctHA')" class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex items-center gap-5 hover:shadow-xl hover:-translate-y-1 transition-all group text-left">
                <div class="bg-slate-900 p-4 rounded-2xl text-white group-hover:bg-orange-500 transition-colors shadow-lg">
                    <i data-lucide="smartphone" class="w-6 h-6"></i>
                </div>
                <div>
                    <h3 class="font-black uppercase italic tracking-tighter text-lg">Tutorial Celular</h3>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Aprenda a criar pelo celular</p>
                </div>
                <div class="ml-auto text-slate-200 group-hover:text-orange-500 transition-colors">
                    <i data-lucide="play-circle" class="w-8 h-8"></i>
                </div>
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="bg-orange-500 p-8 text-white">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter mb-2">Crie sua vitrine hoje</h2>
                <p class="text-orange-100 font-medium">Preencha os dados e gere seu link instantâneo.</p>
            </div>

            <div class="p-8 space-y-10">
                <section class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Seu Nome (Responsável)</label>
                            <input type="text" id="owner-name" oninput="saveDraft()" placeholder="Ex: João Silva" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 focus:bg-white outline-none transition-all font-bold">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Nome da Loja</label>
                            <input type="text" id="store-name" oninput="saveDraft()" placeholder="Ex: Hamburgueria do Jhow" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 focus:bg-white outline-none transition-all font-bold">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">WhatsApp (DDD + Número)</label>
                            <input type="text" id="whatsapp" oninput="saveDraft()" placeholder="Ex: 11999999999" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 focus:bg-white outline-none transition-all font-bold">
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Endereço da Loja</label>
                            <input type="text" id="address" oninput="saveDraft()" placeholder="Ex: Rua das Flores, 123" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 focus:bg-white outline-none transition-all font-bold">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Instagram (Opcional)</label>
                            <input type="text" id="instagram" oninput="saveDraft()" placeholder="Ex: @minhaloja" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 focus:bg-white outline-none transition-all font-bold">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Facebook (Opcional)</label>
                            <input type="text" id="facebook" oninput="saveDraft()" placeholder="Ex: facebook.com/minhaloja" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 focus:bg-white outline-none transition-all font-bold">
                        </div>
                    </div>
                </section>

                <section class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Nicho</label>
                            <select id="niche" onchange="saveDraft()" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 focus:bg-white outline-none transition-all font-bold">
                                <option value="loja">Loja</option>
                                <option value="cardapio">Cardápio</option>
                                <option value="servicos">Serviços</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Cor Principal</label>
                            <input type="color" id="primary-color" oninput="saveDraft()" value="#f97316" class="w-full h-14 rounded-2xl cursor-pointer">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Cor do Banner</label>
                            <input type="color" id="secondary-color" oninput="saveDraft()" value="#0f172a" class="w-full h-14 rounded-2xl cursor-pointer">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">URL da Imagem de Banner (Opcional)</label>
                        <input type="text" id="banner-image" oninput="saveDraft()" placeholder="https://i.ibb.co/minhafoto.jpg" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 focus:bg-white outline-none transition-all font-bold">
                    </div>
                </section>

                <section class="space-y-6">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="font-black uppercase italic tracking-widest text-sm text-orange-600">Itens</h3>
                        <button onclick="addProduct()" class="bg-orange-100 text-orange-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-orange-200">Adicionar Item</button>
                    </div>
                    <div id="products-list" class="space-y-4"></div>
                </section>

                <button id="main-action-btn" onclick="generateStore()" class="w-full py-6 bg-slate-900 text-white rounded-3xl font-black uppercase italic tracking-widest text-xl hover:bg-slate-800 transition-all flex items-center justify-center gap-3 shadow-xl">
                    <i data-lucide="smartphone"></i> <span id="btn-text">Gerar Minha Página</span>
                </button>
                
                <div id="activate-plan-container" class="hidden mt-4">
                    <button onclick="window.open('https://wa.me/5585992862177?text=Olá! Quero ativar o plano profissional do meu catálogo.', '_blank')" class="w-full py-4 bg-green-500 text-white rounded-2xl font-bold uppercase tracking-widest text-sm hover:bg-green-600 transition-all flex items-center justify-center gap-2 shadow-lg">
                        <i data-lucide="zap"></i> Ativar Plano Profissional
                    </button>
                </div>
            </div>
        </div>

        <div id="result-section" class="hidden mt-12 space-y-6">
            <div id="result-card" class="bg-orange-50 rounded-3xl p-8 border-2 border-orange-200">
                <h3 class="text-orange-800 font-black italic uppercase tracking-tighter text-2xl mb-6">Página Gerada!</h3>
                <div class="space-y-6">
                    <div>
                        <h4 class="text-orange-800 font-bold mb-2">Link Público:</h4>
                        <div class="flex flex-col sm:flex-row gap-2">
                            <div id="public-link" class="flex-1 bg-white px-4 py-3 rounded-xl border border-orange-200 text-slate-600 text-sm truncate font-mono"></div>
                            <button onclick="copyLink('public-link')" class="px-6 py-3 bg-orange-600 text-white rounded-xl font-bold hover:bg-orange-700">Copiar Link</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-8 px-6 border-t border-slate-200 mt-10">
        <div class="max-w-4xl mx-auto text-center">
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest">Desenvolvido por Bossa Infor</p>
        </div>
    </footer>

    <a href="https://wa.me/5585992862177?text=Olá! Preciso de suporte com o CatálogoZap." target="_blank" class="fixed bottom-6 right-6 w-16 h-16 bg-green-500 text-white rounded-full shadow-2xl z-50 flex items-center justify-center hover:scale-110 active:scale-95 transition-all">
        <i data-lucide="message-circle"></i>
    </a>

    <script>
        let products = [{ id: Date.now().toString(), name: '', price: '', image: '', description: '' }];

        function proxyImg(url) {
            if (!url) return '';
            let u = url.trim();
            if (u.includes('ibb.co/') && !u.includes('i.ibb.co/')) u = u.replace('ibb.co/', 'i.ibb.co/') + '.png'; 
            if (u.includes('postimg.cc/') && !u.includes('i.postimg.cc/')) u = u.replace('postimg.cc/', 'i.postimg.cc/') + '/image.png';
            if (!u.startsWith('http')) u = 'https://' + u;
            return u;
        }

        function saveDraft() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('edit') || urlParams.get('id')) return;

            const draft = {
                ownerName: document.getElementById('owner-name').value,
                storeName: document.getElementById('store-name').value,
                whatsapp: document.getElementById('whatsapp').value,
                address: document.getElementById('address').value,
                instagram: document.getElementById('instagram').value,
                facebook: document.getElementById('facebook').value,
                niche: document.getElementById('niche').value,
                primaryColor: document.getElementById('primary-color').value,
                secondaryColor: document.getElementById('secondary-color').value,
                bannerImage: document.getElementById('banner-image').value,
                products: products
            };
            localStorage.setItem('catalog_draft', JSON.stringify(draft));
        }

        function loadDraft() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('edit') || urlParams.get('id')) return;

            const draftStr = localStorage.getItem('catalog_draft');
            if (!draftStr) return;

            try {
                const draft = JSON.parse(draftStr);
                document.getElementById('owner-name').value = draft.ownerName || '';
                document.getElementById('store-name').value = draft.storeName || '';
                document.getElementById('whatsapp').value = draft.whatsapp || '';
                document.getElementById('address').value = draft.address || '';
                document.getElementById('instagram').value = draft.instagram || '';
                document.getElementById('facebook').value = draft.facebook || '';
                document.getElementById('niche').value = draft.niche || 'loja';
                document.getElementById('primary-color').value = draft.primaryColor || '#f97316';
                document.getElementById('secondary-color').value = draft.secondaryColor || '#0f172a';
                document.getElementById('banner-image').value = draft.bannerImage || '';
                if (draft.products && draft.products.length > 0) products = draft.products;
            } catch (e) { console.error(e); }
        }

        function addProduct() {
            products.push({ id: Date.now().toString(), name: '', price: '', image: '', description: '' });
            renderProducts();
            saveDraft();
        }

        function removeProduct(id) {
            if (products.length > 1) {
                products = products.filter(p => p.id !== id);
                renderProducts();
                saveDraft();
            }
        }

        function updateProduct(id, field, value) {
            const p = products.find(p => p.id === id);
            if (p) p[field] = value;
            saveDraft();
        }

        function renderProducts() {
            const list = document.getElementById('products-list');
            list.innerHTML = products.map(p => `
                <div class="flex flex-col gap-4 bg-slate-50 p-6 rounded-3xl border border-slate-100 relative">
                    <button onclick="removeProduct('${p.id}')" class="absolute top-2 right-2 text-red-500 p-2"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" value="${p.name}" oninput="updateProduct('${p.id}', 'name', this.value)" placeholder="Nome do Item" class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold">
                        <input type="text" value="${p.price}" oninput="updateProduct('${p.id}', 'price', this.value)" placeholder="Preço (Ex: 29,90)" class="w-full px-4 py-3 rounded-xl border border-slate-200 font-bold">
                    </div>
                    <textarea oninput="updateProduct('${p.id}', 'description', this.value)" placeholder="Descrição (Opcional)" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm h-20 resize-none">${p.description || ''}</textarea>
                    <input type="text" value="${p.image}" oninput="updateProduct('${p.id}', 'image', this.value)" placeholder="URL da Foto (Link Direto)" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-xs">
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function generateStore() {
            const ownerName = document.getElementById('owner-name').value;
            const name = document.getElementById('store-name').value;
            const whatsapp = document.getElementById('whatsapp').value;

            if (!name || !whatsapp || !ownerName) {
                alert("Preencha os campos obrigatórios!");
                return;
            }

            const btn = document.getElementById('main-action-btn');
            btn.innerHTML = '<i class="animate-spin" data-lucide="loader-2"></i> Salvando...';
            btn.disabled = true;
            lucide.createIcons();

            const data = {
                cn: ownerName, n: name, w: whatsapp.replace(/\D/g, ''),
                a: document.getElementById('address').value,
                ig: document.getElementById('instagram').value.replace('@', ''),
                fb: document.getElementById('facebook').value,
                bi: document.getElementById('banner-image').value,
                c: document.getElementById('primary-color').value.replace('#', ''),
                b: document.getElementById('secondary-color').value.replace('#', ''),
                t: document.getElementById('niche').value,
                createdAt: new Date().toISOString(),
                status: "trial",
                expiresAt: new Date(Date.now() + 3 * 24 * 60 * 60 * 1000).toISOString(),
                p: products.filter(p => p.name && p.price).map(p => ({ n: p.name, p: p.price, i: p.image, d: p.description }))
            };

            try {
                const urlParams = new URLSearchParams(window.location.search);
                const existingId = urlParams.get('edit') || urlParams.get('id');
                const storeId = existingId || Math.random().toString(36).substring(2, 8);
                
                await window.fs.setDoc(window.fs.doc(window.db, "stores", storeId), data);

                const publicUrl = window.location.origin + window.location.pathname.replace('criar.html', 'loja.html') + '?id=' + storeId;
                localStorage.setItem('lastStoreId', storeId);
                localStorage.setItem('lastStoreName', name);
                localStorage.removeItem('catalog_draft');

                document.getElementById('public-link').innerText = publicUrl;
                document.getElementById('result-section').classList.remove('hidden');
                document.getElementById('activate-plan-container').classList.remove('hidden');
                document.getElementById('btn-text').innerText = "Atualizar Minha Página";
                checkLastStore();
            } catch (error) {
                console.error(error);
                alert("Erro ao salvar.");
            } finally {
                btn.innerHTML = '<i data-lucide="smartphone"></i> <span id="btn-text">Atualizar Minha Página</span>';
                btn.disabled = false;
                lucide.createIcons();
            }
        }

        function copyLink(id) {
            navigator.clipboard.writeText(document.getElementById(id).innerText);
            alert("Link copiado!");
        }

        function openTutorial(videoId) {
            const modal = document.getElementById('video-modal');
            document.getElementById('tutorial-iframe').src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeTutorial() {
            const modal = document.getElementById('video-modal');
            document.getElementById('tutorial-iframe').src = '';
            modal.classList.add('hidden');
        }

        function checkLastStore() {
            const lastId = localStorage.getItem('lastStoreId');
            const container = document.getElementById('last-store-container');
            if (lastId) container.classList.remove('hidden');
            else container.classList.add('hidden');
        }

        function editLastStore() {
            const lastId = localStorage.getItem('lastStoreId');
            if (lastId) window.location.href = `criar.html?edit=${lastId}`;
        }

        async function loadFromFirebase() {
            const urlParams = new URLSearchParams(window.location.search);
            const storeId = urlParams.get('edit') || urlParams.get('id');
            if (!storeId) return;

            try {
                let attempts = 0;
                while (!window.db && attempts < 50) { await new Promise(r => setTimeout(r, 100)); attempts++; }
                const docSnap = await window.fs.getDoc(window.fs.doc(window.db, "stores", storeId));

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('owner-name').value = data.cn || '';
                    document.getElementById('store-name').value = data.n || '';
                    document.getElementById('whatsapp').value = data.w || '';
                    document.getElementById('address').value = data.a || '';
                    document.getElementById('instagram').value = data.ig || '';
                    document.getElementById('facebook').value = data.fb || '';
                    document.getElementById('primary-color').value = data.c ? '#' + data.c : '#f97316';
                    document.getElementById('secondary-color').value = data.b ? '#' + data.b : '#0f172a';
                    document.getElementById('banner-image').value = data.bi || '';
                    document.getElementById('niche').value = data.t || 'loja';
                    if (data.p) products = data.p.map(p => ({ id: Math.random().toString(36).substr(2, 9), name: p.n, price: p.p, image: p.i, description: p.d }));
                    renderProducts();
                    document.getElementById('btn-text').innerText = "Atualizar Minha Página";
                }
            } catch (e) { console.error(e); }
        }

        window.onload = () => {
            loadDraft();
            checkLastStore();
            loadFromFirebase();
            renderProducts();
        };
    </script>
</body>
</html>
