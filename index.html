<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatálogoZap - Vitrine Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-text { background: linear-gradient(to right, #f97316, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">
    <div class="relative min-h-screen flex flex-col items-center justify-center px-4 py-12 text-center">
        <div class="max-w-4xl mx-auto space-y-6 md:space-y-10">
            <div class="inline-flex items-center gap-2 bg-orange-100 text-orange-700 px-4 py-2 rounded-full text-[10px] md:text-xs font-bold uppercase tracking-widest shadow-sm">
                <i data-lucide="zap" class="w-3 h-3 md:w-4 md:h-4"></i> Versão Profissional
            </div>
            
            <h1 class="text-4xl sm:text-6xl md:text-8xl font-black tracking-tighter italic uppercase leading-[0.9] text-slate-900">
                Sua vitrine no <br><span class="gradient-text">WhatsApp</span>.
            </h1>
            
            <p class="text-lg md:text-2xl text-slate-600 font-medium max-w-2xl mx-auto leading-relaxed px-4">
                Transforme seu atendimento em vendas. Crie um catálogo elegante, rápido e pronto para receber pedidos direto no seu celular.
            </p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-4 px-6">
                <a href="criar.html" class="w-full sm:w-auto px-10 py-5 bg-slate-900 text-white rounded-2xl font-black uppercase italic tracking-widest text-lg hover:bg-orange-600 transition-all shadow-xl hover:scale-105 active:scale-95 flex items-center justify-center gap-3">
                    Começar Agora <i data-lucide="arrow-right"></i>
                </a>
            </div>
        </div>

        <div class="mt-16 relative max-w-4xl mx-auto px-4">
            <div class="bg-white p-2 md:p-4 rounded-[32px] md:rounded-[48px] shadow-2xl border border-slate-100 transform rotate-1">
                <div class="rounded-[24px] md:rounded-[36px] overflow-hidden bg-slate-100">
                    <!-- SUA IMAGEM REAL AQUI -->
                    <img src="https://i.postimg.cc/grFTzT7M/Chat-GPT-Image-1-04-2026-11-54-48.png" 
                         alt="Preview" 
                         class="w-full h-auto"
                         referrerpolicy="no-referrer">
                </div>
            </div>
        </div>
    </div>

    <footer class="py-10 text-center text-slate-400 text-[10px] md:text-sm font-medium">
        &copy; 2026 CatálogoZap - Vitrine Digital Profissional.
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
