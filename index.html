<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatálogoZap - Vitrine Digital Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-text { background: linear-gradient(to right, #f97316, #ea580c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">
    <div class="relative min-h-screen flex flex-col items-center justify-center px-4 py-20 text-center">
        <!-- Background Decor -->
        <div class="absolute top-0 left-0 w-full h-full -z-10 opacity-30 pointer-events-none">
            <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-orange-200 rounded-full blur-[120px]"></div>
            <div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-blue-100 rounded-full blur-[120px]"></div>
        </div>

        <div class="max-w-4xl mx-auto space-y-10">
            <div class="inline-flex items-center gap-2 bg-orange-100 text-orange-700 px-4 py-2 rounded-full text-xs font-bold uppercase tracking-widest shadow-sm">
                <i data-lucide="zap" class="w-4 h-4"></i> Versão Profissional
            </div>
            
            <h1 class="text-6xl md:text-8xl font-black tracking-tighter italic uppercase leading-[0.85] text-slate-900">
                Sua vitrine no <br><span class="gradient-text">WhatsApp</span>.
            </h1>
            
            <p class="text-xl md:text-2xl text-slate-600 font-medium max-w-2xl mx-auto leading-relaxed">
                Transforme seu atendimento em vendas. Crie um catálogo elegante, rápido e pronto para receber pedidos direto no seu celular.
            </p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-6 pt-4">
                <a href="criar.html" class="w-full sm:w-auto px-12 py-6 bg-slate-900 text-white rounded-3xl font-black uppercase italic tracking-widest text-xl hover:bg-orange-600 transition-all shadow-2xl hover:scale-105 active:scale-95 flex items-center justify-center gap-3">
                    Começar Agora <i data-lucide="arrow-right"></i>
                </a>
            </div>
        </div>

        <!-- Preview Image Section -->
        <div class="mt-24 relative max-w-5xl mx-auto px-4">
            <div class="bg-white p-3 rounded-[48px] shadow-[0_32px_64px_-12px_rgba(0,0,0,0.14)] border border-slate-100 transform rotate-1 hover:rotate-0 transition-all duration-700">
                <div class="rounded-[36px] overflow-hidden bg-slate-100 aspect-video flex items-center justify-center">
                    <img src="https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?auto=format&fit=crop&w=1200&q=80" 
                         alt="Preview" 
                         class="w-full h-full object-cover"
                         referrerpolicy="no-referrer">
                </div>
            </div>
        </div>
    </div>

    <footer class="py-10 text-center text-slate-400 text-sm font-medium">
        &copy; 2026 CatálogoZap - A solução definitiva para vendas no WhatsApp.
    </footer>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
