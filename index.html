<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatálogoZap - Vitrine Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .preview-card { 
            width: 100%; 
            max-width: 800px; 
            aspect-ratio: 16/9; 
            background-image: url('https://i.postimg.cc/grFTzT7M/Chat-GPT-Image-1-04-2026-11-54-48.png');
            background-size: cover;
            background-position: center;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2);
            border: 4px solid white;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <!-- Selo de Versão 9 -->
    <div class="fixed top-0 left-0 bg-red-600 text-white text-[10px] px-3 py-1 font-black z-50 rounded-br-lg shadow-lg">
        V9.0 - FINAL ABSOLUTA
    </div>

    <main class="min-h-screen flex flex-col items-center justify-center px-4 py-10 text-center">
        <div class="max-w-4xl w-full space-y-6 md:space-y-10">
            <h1 class="text-4xl sm:text-6xl md:text-8xl font-black tracking-tighter uppercase italic leading-[0.9]">
                Sua vitrine no <br><span class="text-orange-500">WhatsApp</span>
            </h1>
            
            <p class="text-base sm:text-xl md:text-2xl text-slate-500 font-medium max-w-2xl mx-auto leading-relaxed">
                Crie seu catálogo profissional em segundos e receba pedidos organizados direto no seu celular.
            </p>

            <div class="pt-4">
                <a href="criar.html" class="inline-flex items-center gap-3 px-10 py-5 bg-slate-900 text-white rounded-2xl font-black uppercase italic tracking-widest text-lg hover:bg-orange-600 transition-all shadow-xl hover:scale-105 active:scale-95">
                    <i data-lucide="zap"></i> Começar Agora
                </a>
            </div>
        </div>

        <!-- Preview com método de Background (Mais estável) -->
        <div class="mt-12 w-full flex justify-center px-4">
            <div class="preview-card"></div>
        </div>
    </main>

    <footer class="py-10 text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest">
        &copy; 2026 CatálogoZap - Vitrine Digital Profissional
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
