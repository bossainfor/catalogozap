<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatálogoZap - Vitrine Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div class="fixed top-0 left-0 bg-orange-600 text-white text-[10px] px-2 py-1 font-bold z-50 shadow-md">SISTEMA V3 - PREMIUM</div>
    
    <div class="relative min-h-screen flex flex-col items-center justify-center px-4 py-20 text-center">
        <div class="max-w-4xl mx-auto space-y-8">
            <h1 class="text-5xl md:text-8xl font-black tracking-tighter italic uppercase leading-[0.9] text-slate-900">
                Sua vitrine no <span class="text-orange-500">WhatsApp</span>.
            </h1>
            <p class="text-xl md:text-2xl text-slate-500 font-medium max-w-2xl mx-auto">
                Transforme seu WhatsApp em uma máquina de vendas com um catálogo profissional, elegante e ultra-rápido.
            </p>
            <div class="flex justify-center gap-4 pt-8">
                <a href="criar.html" class="px-12 py-6 bg-slate-900 text-white rounded-3xl font-black uppercase italic tracking-widest text-xl hover:scale-105 transition-all shadow-2xl flex items-center gap-3">
                    <i data-lucide="plus-circle"></i> Começar Agora
                </a>
            </div>
        </div>

        <div class="mt-20 max-w-5xl mx-auto">
            <div class="bg-white p-4 rounded-[40px] shadow-2xl border border-slate-100 transform rotate-1">
                <!-- Imagem Corrigida (Sem crossorigin) -->
                <img src="https://i.postimg.cc/grFTzT7M/Chat-GPT-Image-1-04-2026-11-54-48.png" 
                     alt="Preview" class="rounded-[32px] w-full h-auto" referrerpolicy="no-referrer">
            </div>
        </div>
    </div>

    <script>lucide.createIcons();</script>

</html>
