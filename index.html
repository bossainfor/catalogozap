<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatálogoZap - Vitrine Digital Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #f97316 0%, #ea580c 100%); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <!-- Selo de Versão para você conferir se atualizou -->
    <div class="fixed top-0 left-0 bg-slate-900 text-white text-[10px] px-3 py-1 font-black z-50 rounded-br-lg shadow-lg uppercase tracking-widest">
        Versão 5.0 - Estável
    </div>

    <main class="min-h-screen flex flex-col items-center justify-center px-4 py-12">
        <div class="max-w-4xl w-full text-center space-y-8">
            <div class="inline-flex items-center gap-2 bg-orange-100 text-orange-600 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.2em] mx-auto">
                <i data-lucide="award" class="w-3 h-3"></i> Tecnologia Premium
            </div>
            
            <h1 class="text-5xl sm:text-7xl md:text-8xl font-black tracking-tighter uppercase italic leading-[0.85] text-slate-900">
                Venda mais pelo <br><span class="text-orange-500">WhatsApp</span>.
            </h1>
            
            <p class="text-lg sm:text-xl md:text-2xl text-slate-500 font-medium max-w-2xl mx-auto leading-relaxed">
                Crie seu catálogo profissional em segundos e receba pedidos organizados direto no seu celular.
            </p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-4">
                <a href="criar.html" class="w-full sm:w-auto px-12 py-5 bg-slate-900 text-white rounded-2xl font-black uppercase italic tracking-widest text-lg hover:bg-orange-600 transition-all shadow-2xl hover:scale-105 active:scale-95 flex items-center justify-center gap-3">
                    <i data-lucide="rocket"></i> Criar Agora
                </a>
            </div>
        </div>

        <!-- Preview do Projeto -->
        <div class="mt-16 w-full max-w-4xl px-4">
            <div class="bg-white p-2 sm:p-4 rounded-[32px] border border-slate-200 shadow-[0_32px_64px_-12px_rgba(0,0,0,0.1)] transform rotate-1 hover:rotate-0 transition-all duration-500">
                <div class="rounded-[24px] overflow-hidden bg-slate-100">
                    <img src="https://i.postimg.cc/grFTzT7M/Chat-GPT-Image-1-04-2026-11-54-48.png" 
                         alt="Preview" 
                         class="w-full h-auto block"
                         referrerpolicy="no-referrer">
                </div>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest">
        &copy; 2026 CatálogoZap - O melhor gerador de vitrines do Brasil
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
