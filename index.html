<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>CatálogoZap - Vitrine Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .img-container { 
            width: 100%; 
            max-width: 800px; 
            background: #f8fafc;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.2);
            border: 6px solid white;
        }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 2rem; }
    </style>
</head>
<body class="bg-slate-900 text-white">
    <main class="min-h-screen flex flex-col items-center justify-center px-4 py-12 text-center">
        <div class="max-w-4xl w-full space-y-8">
            <div class="flex justify-center mb-8">
                <img src="https://i.postimg.cc/8cgHJgH8/catalogo.png" alt="CatálogoZap" class="h-40 sm:h-48 w-auto" referrerpolicy="no-referrer">
            </div>
            <h1 class="text-5xl sm:text-7xl md:text-8xl font-black tracking-tighter uppercase italic leading-[0.85]">
                Venda mais pelo <br><span class="text-[#25D366]">WhatsApp</span>
            </h1>
            
            <p class="text-lg sm:text-xl md:text-2xl text-slate-300 font-medium max-w-2xl mx-auto leading-relaxed">
                Crie seu catálogo profissional em segundos e receba pedidos organizados direto no seu celular.
            </p>

            <!-- TUTORIAIS -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 pt-10">
                <div class="space-y-4">
                    <h3 class="font-black uppercase italic tracking-tighter text-xl text-white">Passo a Passo</h3>
                    <div class="p-1 bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                        <div class="video-container">
                            <iframe src="https://www.youtube.com/embed/TCl0JDZ_GJ4" title="Passo a Passo" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>
                    </div>
                </div>
                <div class="space-y-4">
                    <h3 class="font-black uppercase italic tracking-tighter text-xl text-white">Funcionalidades Premium</h3>
                    <div class="p-1 bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                        <div class="video-container">
                            <iframe src="https://www.youtube.com/embed/q82XaWvy3BA" title="Funcionalidades Premium" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>
                    </div>
                </div>
            </div>

            <div class="pt-16 pb-12">
                <a href="criar.html" class="inline-flex items-center gap-3 px-12 py-6 bg-[#25D366] text-slate-900 rounded-3xl font-black uppercase italic tracking-widest text-xl hover:bg-[#128C7E] hover:text-white transition-all shadow-[0_20px_50px_rgba(37,211,102,0.3)] hover:scale-105 active:scale-95">
                    <i data-lucide="zap"></i> Criar Agora
                </a>
            </div>
        </div>

        <!-- Imagem de Preview (Direta e Estável) -->
        <div class="mt-16 w-full flex justify-center px-4">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=800&q=80" 
                     alt="Preview" 
                     class="w-full h-auto block"
                     referrerpolicy="no-referrer">
            </div>
        </div>
    </main>

    <footer class="py-10 text-center text-slate-500 text-[10px] font-bold uppercase tracking-widest">
        &copy; 2026 Desenvolvido por Bossa Infor - Vitrine Digital Profissional
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
