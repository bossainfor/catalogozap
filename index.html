<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatálogoZap - Vitrine Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .btn-shadow { box-shadow: 0 20px 40px -10px rgba(249, 115, 22, 0.4); }
    </style>
</head>
<body class="bg-white text-slate-900">
    <main class="min-h-screen flex flex-col items-center justify-center px-6 py-12 text-center">
        <div class="max-w-4xl mx-auto space-y-8">
            <div class="inline-block bg-orange-100 text-orange-600 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.2em]">
                Versão Profissional 2026
            </div>
            
            <h1 class="text-4xl sm:text-6xl md:text-8xl font-black tracking-tighter uppercase italic leading-[0.9]">
                Sua vitrine no <br><span class="text-orange-500">WhatsApp</span>.
            </h1>
            
            <p class="text-base sm:text-xl md:text-2xl text-slate-500 font-medium max-w-2xl mx-auto leading-relaxed">
                Transforme seu atendimento em vendas. Crie um catálogo elegante, rápido e pronto para receber pedidos direto no seu celular.
            </p>

            <div class="pt-6">
                <a href="criar.html" class="inline-flex items-center gap-3 px-10 py-5 bg-slate-900 text-white rounded-2xl font-black uppercase italic tracking-widest text-lg hover:bg-orange-600 transition-all btn-shadow hover:scale-105 active:scale-95">
                    Começar Agora <i data-lucide="arrow-right"></i>
                </a>
            </div>
        </div>

        <!-- Imagem do Projeto -->
        <div class="mt-16 w-full max-w-4xl">
            <div class="bg-slate-50 p-2 sm:p-4 rounded-[32px] border border-slate-100 shadow-2xl transform rotate-1">
                <img src="https://i.postimg.cc/grFTzT7M/Chat-GPT-Image-1-04-2026-11-54-48.png" 
                     alt="Preview" 
                     class="w-full h-auto rounded-[24px] shadow-inner"
                     referrerpolicy="no-referrer">
            </div>
        </div>
    </main>

    <footer class="py-10 text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest">
        &copy; 2026 CatálogoZap - Vitrine Digital Profissional
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>
