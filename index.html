<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatálogoZap - Vitrine Digital Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .img-container { position: relative; width: 100%; padding-bottom: 56.25%; background: #f1f5f9; border-radius: 24px; overflow: hidden; }
        .img-container img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <!-- Selo de Versão Final -->
    <div class="fixed top-0 left-0 bg-orange-600 text-white text-[10px] px-3 py-1 font-black z-50 rounded-br-lg shadow-lg uppercase tracking-widest">
        Versão 6.0 - Final
    </div>

    <main class="min-h-screen flex flex-col items-center justify-center px-4 py-12">
        <div class="max-w-4xl w-full text-center space-y-6 md:space-y-10">
            <div class="inline-flex items-center gap-2 bg-orange-100 text-orange-600 px-4 py-2 rounded-full text-[10px] font-black uppercase tracking-[0.2em] mx-auto">
                <i data-lucide="check-circle" class="w-3 h-3"></i> Sistema Verificado
            </div>
            
            <h1 class="text-4xl sm:text-6xl md:text-8xl font-black tracking-tighter uppercase italic leading-[0.9] text-slate-900">
                Venda mais pelo <br><span class="text-orange-500">WhatsApp</span>.
            </h1>
            
            <p class="text-base sm:text-xl md:text-2xl text-slate-500 font-medium max-w-2xl mx-auto leading-relaxed px-4">
                Crie seu catálogo profissional em segundos e receba pedidos organizados direto no seu celular.
            </p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4 pt-4 px-6">
                <a href="criar.html" class="w-full sm:w-auto px-12 py-5 bg-slate-900 text-white rounded-2xl font-black uppercase italic tracking-widest text-lg hover:bg-orange-600 transition-all shadow-2xl hover:scale-105 active:scale-95 flex items-center justify-center gap-3">
                    <i data-lucide="zap"></i> Criar Agora
                </a>
            </div>
        </div>

        <!-- Preview do Projeto Corrigido -->
        <div class="mt-16 w-full max-w-4xl px-4">
            <div class="bg-white p-2 md:p-4 rounded-[32px] border border-slate-200 shadow-2xl transform rotate-1">
                <div class="img-container">
                    <!-- Link Direto Blindado -->
                    <img src="https://i.postimg.cc/grFTzT7M/Chat-GPT-Image-1-04-2026-11-54-48.png" 
                         alt="Preview" 
                         loading="eager"
                         referrerpolicy="no-referrer">
                </div>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest">
        &copy; 2026 CatálogoZap - Vitrine Digital Profissional
    </footer>

    <script>lucide.createIcons();</script>
</body>
