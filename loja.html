        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJaxRdA6uzbN41JvAw8xO7F5mzJaDfMBc",
            authDomain: "gen-lang-client-0664324166.firebaseapp.com",
            projectId: "gen-lang-client-0664324166",
            storageBucket: "gen-lang-client-0664324166.firebasestorage.app",
            messagingSenderId: "1074933311707",

        const app = initializeApp(firebaseConfig);

    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        .dark body { background-color: #0f172a; color: #f8fafc; }

        .cart-drawer.open { transform: translateX(0); display: flex; }
        .overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s; display: none; }
        .overlay.open { opacity: 1; pointer-events: auto; display: block; }
        .category-scroll::-webkit-scrollbar { display: none; }
        .category-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Media Swiper Styles */
        .media-swiper::-webkit-scrollbar { display: none; }
        .media-swiper { -ms-overflow-style: none; scrollbar-width: none; touch-action: pan-y; }
        .video-wrapper { position: relative; width: 100%; height: 100%; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        /* Impede que o iframe bloqueie o scroll no mobile se tocado nas bordas */
        .video-wrapper::before { content: ''; position: absolute; inset: 0; pointer-events: none; border: 20px solid transparent; z-index: 10; }

        /* Dark Mode overrides */
        .dark .bg-white { background-color: #1e293b; }
        .dark .bg-slate-50 { background-color: #0f172a; }
        .dark .text-slate-900 { color: #f1f5f9; }
        .dark .text-slate-700 { color: #cbd5e1; }

        /* Modal Styles */
        .modal { opacity: 0; pointer-events: none; transition: opacity 0.3s; display: none; }
        .modal.open { opacity: 1; pointer-events: auto; display: flex; }
        .modal-content { transform: translateY(20px); transition: transform 0.3s; }
        .modal.open .modal-content { transform: translateY(0); }
        
        .active-scale:active { transform: scale(0.96); }
        .active-scale { transition: transform 0.15s cubic-bezier(0.4, 0, 0.2, 1); will-change: transform; }
    </style>
</head>
<body class="bg-white text-slate-900">

                    <button onclick="closeModal()" class="p-2.5 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition-all active-scale dark:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                
                <!-- Painel de Detalhes -->
                <div id="modal-tab-details-content" class="p-6 sm:p-10 lg:p-12 overflow-y-auto min-h-0 flex-1 custom-scrollbar">

                    <!-- Resumo das Avaliações -->

                                <button type="button" onclick="setReviewRating(3)" class="star-btn hover:scale-110 transition-transform"><i data-lucide="star" class="w-6 h-6"></i></button>

                        <!-- Comentário / Descrição -->

                            <label class="block text-xs font-bold text-slate-400 mb-1.5 uppercase">Sua Opinião (pequena descrição):</label>
                            <textarea id="review-comment" rows="3" placeholder="O que achou do produto? Detalhes sobre qualidade, tamanho, etc." class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-xs sm:text-sm font-medium focus:outline-none focus:ring-2 focus:ring-emerald-500 text-slate-900 dark:text-white"></textarea>

                        <!-- Enviar -->

                    <button id="modal-add-btn" class="w-full py-5 sm:py-6 text-white font-black uppercase italic tracking-widest rounded-2xl shadow-[0_12px_24px_-8px_rgba(249,115,22,0.4)] transition-all active-scale flex items-center justify-center gap-3 text-sm sm:text-base touch-manipulation select-none">

    <div id="cart-drawer" class="cart-drawer fixed top-0 right-0 h-full w-full sm:max-w-md bg-white dark:bg-slate-800 z-[1050] shadow-2xl flex flex-col">

            <h2 class="text-lg sm:text-xl font-black uppercase italic tracking-tighter dark:text-white">Seu Carrinho</h2>
            <button onclick="toggleCart(false)" class="p-3 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition-colors dark:text-white"><i data-lucide="x"></i></button>
        </div>

        <div class="relative">
            <i data-lucide="shopping-cart" size="28"></i>
            <span id="cart-count" class="absolute -top-1 -right-1 bg-slate-900 text-white text-[10px] font-black w-6 h-6 rounded-full flex items-center justify-center border-2 border-white">0</span>

    <!-- Botão Flutuante de Download de App (FAB) -->
    <a id="app-download-fab" href="#" target="_blank" class="hidden fixed bottom-6 left-6 sm:bottom-8 sm:left-8 text-white p-4 sm:p-5 rounded-full shadow-2xl z-[60] flex items-center justify-center hover:scale-110 active:scale-95 transition-all border-4 border-white dark:border-slate-800 animate-bounce cursor-pointer group" title="Baixar nosso Aplicativo">
        <div class="relative flex items-center justify-center">
            <i data-lucide="smartphone" class="w-6 h-6 sm:w-7 sm:h-7"></i>
            <span class="absolute -bottom-1 -right-1 bg-green-500 text-white text-[8px] font-black px-1 rounded-full border border-white">APP</span>
        </div>
    </a>

    <script>
        let storeData = null;
        let cart = [];
        let selectedCategory = 'Todos';
        let searchQuery = '';
        let currentVariations = {};
        let selectedShippingZone = null;
        let selectedPaymentMethod = 'pix';
        let selectedInstallment = 1;

        window.setPaymentMethod = function(method) {
            selectedPaymentMethod = method;
            if (method === 'card') {
                selectedInstallment = storeData && storeData.mxi ? parseInt(storeData.mxi) : 10;
            } else {
                selectedInstallment = 1;
            }
            updateCartUI();
        }

        window.setInstallment = function(inst) {
            selectedInstallment = parseInt(inst);
            updateCartUI();
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            lucide.createIcons();
        }

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        setInterval(() => {
            const timers = document.querySelectorAll('[data-countdown]');
            timers.forEach(timer => {
                const end = new Date(timer.dataset.countdown).getTime();
                const now = new Date().getTime();
                const diff = end - now;
                if (diff <= 0) {
                    timer.innerHTML = "OFERTA ENCERRADA";
                    return;
                }
                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                timer.innerHTML = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            });
        }, 1000);

        window.selectVariation = function(label, value, btn) {
            currentVariations[label] = value;
            const parent = btn.parentElement;
            parent.querySelectorAll('.var-btn').forEach(b => {
                b.classList.remove('bg-orange-50', 'text-orange-600', 'dark:bg-orange-900/20', 'border-transparent');
                b.classList.add('bg-slate-50', 'text-slate-800', 'dark:bg-slate-800', 'dark:text-white');
                b.style.borderColor = '';
            });
            btn.classList.remove('bg-slate-50', 'text-slate-800', 'dark:bg-slate-800', 'dark:text-white');
            btn.classList.add('bg-orange-50', 'text-orange-600', 'dark:bg-orange-900/20', 'border-transparent');
            btn.style.borderColor = storeData.primaryColor;
        }

        window.openProductModal = function(productId) {
            if (window._isOpeningModal) return;
            window._isOpeningModal = true;
            setTimeout(() => window._isOpeningModal = false, 200);

            console.log("Chamando modal para:", productId);
            const product = storeData.products.find(p => p.id === productId);
            if (!product) {
                console.error("Produto não encontrado:", productId);
                return;
            }

            // Garante que o catálogo completo esteja disponível para o assistente IA
            if (!window.fullCatalog && storeData.products) window.fullCatalog = storeData.products;

            const modal = document.getElementById('product-modal');
            const overlay = document.getElementById('overlay');
            
            const mediaCont = document.getElementById('modal-media-container');
            
            // Coletar todas as mídias disponíveis (Suporte a 4 fotos)
            const mediaItems = [];
            if (product.image) mediaItems.push({ type: 'image', url: proxyImg(product.image) });
            if (product.i2) mediaItems.push({ type: 'image', url: proxyImg(product.i2) });
            if (product.i3) mediaItems.push({ type: 'image', url: proxyImg(product.i3) });
            if (product.i4) mediaItems.push({ type: 'image', url: proxyImg(product.i4) });
            if (product.i5) mediaItems.push({ type: 'image', url: proxyImg(product.i5) });
            if (product.i6) mediaItems.push({ type: 'image', url: proxyImg(product.i6) });
            if (product.videoUrl) {
                const embedInfo = getEmbedUrl(product.videoUrl);
                mediaItems.push({ type: 'video', url: embedInfo.url, isDirect: embedInfo.isDirect, original: embedInfo.original });
            }

            let mediaHTML = `<button onclick="closeModal()" class="md:hidden absolute top-4 right-4 z-[1020] bg-black/40 text-white p-3 rounded-full backdrop-blur-md active-scale transition-all touch-manipulation"><i data-lucide="x" class="w-6 h-6"></i></button>`;
            
            if (mediaItems.length > 1) {
                const swiperId = `modal-swiper-${product.id}`;
                mediaHTML += `
                    <div id="${swiperId}" onscroll="updateDots('${swiperId}')" class="media-swiper absolute inset-0 flex overflow-x-auto snap-x snap-mandatory scroll-smooth w-full h-full bg-slate-950">
                        ${mediaItems.map(item => `
                            <div class="snap-start flex-shrink-0 w-full h-full relative flex items-center justify-center bg-slate-950">
                                ${item.type === 'image' ? `
                                    <img src="${item.url}" class="w-full h-full object-contain">
                                ` : `
                                    <div class="video-wrapper">
                                        ${item.isDirect ? `
                                            <video src="${item.url}" controls class="w-full h-full object-contain" playsinline></video>
                                        ` : `
                                            <iframe src="${item.url}" frameborder="0" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                                        `}
                                        <a href="${item.original}" target="_blank" class="absolute bottom-4 right-4 bg-black/60 text-white px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase tracking-widest backdrop-blur-md flex items-center gap-2 hover:bg-black/80 transition-all">
                                            <i data-lucide="external-link" class="w-3 h-3"></i> Ver no Navegador
                                        </a>
                                    </div>
                                `}
                            </div>
                        `).join('')}
                    </div>
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 z-30">
                        <button onclick="document.getElementById('${swiperId}').scrollBy({left: -document.getElementById('${swiperId}').offsetWidth, behavior: 'smooth'})" class="p-2.5 bg-white/20 hover:bg-white/40 backdrop-blur-md rounded-full text-white border border-white/20 active-scale"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                    </div>
                    <div class="absolute inset-y-0 right-0 flex items-center pr-4 z-30">
                        <button onclick="document.getElementById('${swiperId}').scrollBy({left: document.getElementById('${swiperId}').offsetWidth, behavior: 'smooth'})" class="p-2.5 bg-white/20 hover:bg-white/40 backdrop-blur-md rounded-full text-white border border-white/20 active-scale"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                    </div>
                    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-30 flex gap-2" id="dots-${swiperId}">
                        ${mediaItems.map((_, i) => `<div class="w-2 h-2 rounded-full ${i === 0 ? 'bg-white' : 'bg-white/40'} shadow-sm transition-all border border-transparent"></div>`).join('')}
                    </div>
                `;
            } else if (mediaItems.length === 1) {
                const item = mediaItems[0];
                if (item.type === 'video') {
                    mediaHTML += `
                        <div class="video-wrapper">
                            ${item.isDirect ? `
                                <video src="${item.url}" controls class="w-full h-full object-contain" playsinline></video>
                            ` : `
                                <iframe src="${item.url}" frameborder="0" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                            `}
                            <a href="${item.original}" target="_blank" class="absolute bottom-4 right-4 bg-black/60 text-white px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase tracking-widest backdrop-blur-md flex items-center gap-2 hover:bg-black/80 transition-all">
                                <i data-lucide="external-link" class="w-3 h-3"></i> Ver no Navegador
                            </a>
                        </div>`;
                } else {
                    mediaHTML += `<div class="w-full h-full flex items-center justify-center bg-slate-950 px-4 md:px-0"><img src="${item.url}" class="w-full h-full object-contain selection:bg-none"></div>`;
                }
            } else {

        window.updateReviewCountBadge = async function(productId) {
            try {
                // Aguarda se o Firebase ainda não estiver inicializado
                let attempts = 0;
                while ((!window.firebaseUtils || !window.db) && attempts < 50) {
                    await new Promise(r => setTimeout(r, 100));
                    attempts++;
                }
                if (!window.firebaseUtils || !window.db) return;

                const { collection, getDocs, query, where } = window.firebaseUtils;
                const urlParams = new URLSearchParams(window.location.search);
                const storeId = urlParams.get('id');
                if (!storeId) return;
                
                const reviewsRef = collection(window.db, "stores", storeId, "reviews");
                const q = query(reviewsRef, where("productId", "==", productId));
                const querySnapshot = await getDocs(q);
                
                const count = querySnapshot.size;
                const badge = document.getElementById('modal-reviews-count');
                if (badge) badge.innerText = count;
            } catch (e) {
                console.error("Erro ao buscar contagem de avaliações:", e);

        window.loadReviews = async function(productId) {
            const reviewsList = document.getElementById('reviews-list');
            if (!reviewsList) return;
            reviewsList.innerHTML = '<div class="flex justify-center py-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-orange-500"></div></div>';
            
            try {
                // Aguarda se o Firebase ainda não estiver inicializado
                let attempts = 0;
                while ((!window.firebaseUtils || !window.db) && attempts < 50) {
                    await new Promise(r => setTimeout(r, 100));
                    attempts++;
                }
                if (!window.firebaseUtils || !window.db) {
                    reviewsList.innerHTML = '<p class="text-center text-xs text-red-500 py-4 font-bold">Erro: Firebase não inicializado.</p>';
                    return;
                }

                const { collection, getDocs, query, where } = window.firebaseUtils;
                const urlParams = new URLSearchParams(window.location.search);
                const storeId = urlParams.get('id');
                if (!storeId) return;
                
                const reviewsRef = collection(window.db, "stores", storeId, "reviews");
                const q = query(reviewsRef, where("productId", "==", productId));
                const querySnapshot = await getDocs(q);
                
                const reviews = [];
                querySnapshot.forEach((doc) => {
                    reviews.push({ id: doc.id, ...doc.data() });
                });
                
                // Ordenar por data decrescente
                reviews.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
                
                // Atualizar badge do header
                const badge = document.getElementById('modal-reviews-count');
                if (badge) badge.innerText = reviews.length;
                
                renderReviewsUI(reviews);
            } catch (e) {
                console.error("Erro ao carregar avaliações:", e);
                reviewsList.innerHTML = `<p class="text-center text-xs text-red-500 py-4 font-bold">Erro ao carregar avaliações: ${e.message || e}</p>`;
            }
        }

        function renderReviewsUI(reviews) {
            const avgRatingElem = document.getElementById('reviews-avg-rating');
            const avgStarsElem = document.getElementById('reviews-avg-stars');
            const totalTextElem = document.getElementById('reviews-total-text');
            const reviewsList = document.getElementById('reviews-list');
            
            if (!reviewsList) return;

            const totalReviews = reviews.length;
            let avgRating = 0;
            if (totalReviews > 0) {
                const sum = reviews.reduce((acc, r) => acc + (r.rating || 0), 0);
                avgRating = (sum / totalReviews).toFixed(1);
            } else {
                avgRating = "0.0";
            }
            
            if (avgRatingElem) avgRatingElem.innerText = avgRating;
            
            let starsHTML = '';
            const roundedAvg = Math.round(parseFloat(avgRating));
            for (let i = 1; i <= 5; i++) {
                if (i <= roundedAvg) {
                    starsHTML += '<i data-lucide="star" class="w-5 h-5 text-amber-400 fill-amber-400"></i>';
                } else {
                    starsHTML += '<i data-lucide="star" class="w-5 h-5 text-slate-300 dark:text-slate-600 fill-none"></i>';
                }
            }
            if (avgStarsElem) avgStarsElem.innerHTML = starsHTML;
            if (totalTextElem) totalTextElem.innerText = `${totalReviews} ${totalReviews === 1 ? 'avaliação' : 'avaliações'}`;
            
            if (totalReviews === 0) {
                reviewsList.innerHTML = `
                    <div class="text-center py-10 text-slate-400 dark:text-slate-500">
                        <p class="font-bold text-sm">Nenhuma avaliação ainda.</p>
                        <p class="text-xs mt-1">Seja o primeiro a avaliar este produto!</p>
                    </div>
                `;
            } else {
                reviewsList.innerHTML = reviews.map(r => {
                    let userStars = '';
                    for (let i = 1; i <= 5; i++) {
                        if (i <= (r.rating || 0)) {
                            userStars += '<i data-lucide="star" class="w-3.5 h-3.5 text-amber-400 fill-amber-400"></i>';
                        } else {
                            userStars += '<i data-lucide="star" class="w-3.5 h-3.5 text-slate-300 dark:text-slate-600 fill-none"></i>';
                        }
                    }
                    
                    const dateStr = r.createdAt ? new Date(r.createdAt).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' }) : 'Recente';
                    
                    return `
                        <div class="p-4 border border-slate-100 dark:border-slate-800 rounded-2xl bg-slate-50/50 dark:bg-slate-900/40 text-left">
                            <div class="flex justify-between items-start gap-2 mb-2">
                                <div>
                                    <p class="font-black text-sm text-slate-800 dark:text-white">${escapeHTML(r.name || 'Cliente Satisfeito')}</p>
                                    <div class="flex gap-0.5 mt-1">${userStars}</div>
                                </div>
                                <span class="text-[10px] text-slate-400 font-bold">${dateStr}</span>
                            </div>
                            <p class="text-xs sm:text-sm text-slate-500 dark:text-slate-400 leading-relaxed font-medium mt-1">
                                ${escapeHTML(r.comment || 'Sem comentário.')}
                            </p>
                        </div>
                    `;
                }).join('');
            }
            setTimeout(() => lucide.createIcons(), 50);
        }

        window.submitReview = async function() {

            const commentInput = document.getElementById('review-comment');
            
            if (!nameInput || !commentInput) return;

            const rating = window.currentReviewRating || 0;
            const name = nameInput.value.trim();
            const comment = commentInput.value.trim();
            
            if (rating < 1 || rating > 5) {
                alert('Por favor, escolha uma nota de 1 a 5 estrelas.');

            if (!name) {
                alert('Por favor, informe o seu nome.');
                return;
            }
            if (!comment) {
                alert('Por favor, escreva o seu comentário.');
                return;
            }
            
            const submitBtn = document.getElementById('btn-submit-review');
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.innerText = 'Enviando...';
            }
            
            try {
                const { collection, addDoc } = window.firebaseUtils;
                const urlParams = new URLSearchParams(window.location.search);
                const storeId = urlParams.get('id');
                const productId = window.currentProductId;
                
                const reviewData = {
                    productId: productId,
                    name: name,
                    rating: rating,
                    comment: comment,
                    createdAt: Date.now()
                };
                
                const reviewsRef = collection(window.db, "stores", storeId, "reviews");
                await addDoc(reviewsRef, reviewData);

                const starBtns = document.querySelectorAll('.star-btn svg, .star-btn i');
                starBtns.forEach((icon) => {

                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // Proxy de Imagem (Melhorado para Postimages e outros)
        function proxyImg(url) {
            if (!url) return '';
            let u = url.trim();
            
            // Se for base64, retorna direto
            if (u.startsWith('data:image')) return u;
            
            // Se for link do Firebase, não precisa de proxy
            if (u.includes('firebasestorage.')) return u;
            
            // Tratamento inteligente para Postimages
            if (u.includes('postimg.cc/')) {
                // Se o cliente colou o link da página (ex: postimg.cc/65sF32Sj)
                // Transformamos no link direto (ex: i.postimg.cc/65sF32Sj/image.jpg)
                if (!u.includes('i.postimg.cc/')) {
                    const parts = u.split('/');
                    const id = parts[parts.length - 1];
                    u = `https://i.postimg.cc/${id}/image.jpg`;
                }
            }
            
            // Tratamento para ImgBB
            if (u.includes('ibb.co/') && !u.includes('i.ibb.co/')) {
                u = u.replace('ibb.co/', 'i.ibb.co/') + '.png';
            }

            if (!u.startsWith('http')) u = 'https://' + u;
            return u;
        }

        // Resolutor de redirecionamento resiliente para WhatsApp de alta compatibilidade (WebViews / Kodular / Mobile / PC / Browsers)
        window.openResilientWhatsApp = function(phone, text) {
            let cleanPhone = String(phone).replace(/\D/g, '');
            if (cleanPhone.length <= 11 && cleanPhone.length > 0) {
                cleanPhone = '55' + cleanPhone;
            }
            
            // Corrige possíveis problemas de dupla ou tripla codificação do texto
            let decodedText = '';
            try {
                // Tenta decodificar recursivamente para garantir que temos o texto puro sem codificação de URL
                let currentText = text || '';
                let lastText = '';
                let attempts = 0;
                while (currentText !== lastText && attempts < 5) {
                    lastText = currentText;
                    currentText = decodeURIComponent(currentText);
                    attempts++;
                }
                decodedText = currentText;
            } catch (e) {
                decodedText = text || '';
            }
            
            // Codifica o texto purificado de forma limpa uma única vez
            const encodedText = encodeURIComponent(decodedText);
            
            // Links universais seguros (wa.me é o mais resiliente no PC e Mobile)
            const waMeUrl = `https://wa.me/${cleanPhone}${encodedText ? '?text=' + encodedText : ''}`;
            const apiWebUrl = `https://api.whatsapp.com/send?phone=${cleanPhone}&text=${encodedText}`;
            const nativeDeepLink = `whatsapp://send?phone=${cleanPhone}&text=${encodedText}`;
            
            try {
                const ua = navigator.userAgent || '';
                // Detecção robusta de WebViews / Apps mobile hibridos / Emuladores
                const isWebView = /wv|Kodular|thunkable|bubble|android/i.test(ua) || (window.Android && window.Android.showToast);
                const isMobile = /Android|iPhone|iPad|iPod/i.test(ua);
                
                if (isWebView || isMobile) {
                    // 1. Tenta redirecionamento normal usando wa.me (altamente recomendado e compatível)
                    window.location.href = waMeUrl;
                    
                    // 2. Primeiro Fallback (350ms): Tenta forçar o link nativo "whatsapp://" caso o WebView bloqueie wa.me
                    setTimeout(() => {
                        const link = document.createElement('a');
                        link.href = nativeDeepLink;
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    }, 350);
                    
                    // 3. Segundo Fallback (800ms): Tenta a URL clássica api.whatsapp.com como última opção
                    setTimeout(() => {
                        window.location.href = apiWebUrl;
                    }, 800);
                } else {
                    // No Desktop / Computador, abre wa.me em uma nova guia de forma limpa e moderna
                    const win = window.open(waMeUrl, '_blank');
                    if (!win) {
                        window.location.href = waMeUrl;
                    }
                }
            } catch (err) {
                console.error("Erro no redirecionamento whatsapp:", err);
                // Último recurso de emergência
                window.location.href = waMeUrl;
            }
        }

        function getEmbedUrl(url) {
            if (!url) return { url: '', isDirect: false, original: '' };
            let u = url.trim();
            const original = u;
            
            // YouTube
            if (u.includes('youtube.com/watch?v=') || u.includes('youtu.be/')) {
                const id = u.includes('watch?v=') ? u.split('v=')[1].split('&')[0] : u.split('youtu.be/')[1].split('?')[0];
                return { url: `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&autoplay=0`, isDirect: false, original };
            }
            if (u.includes('youtube.com/shorts/')) {
                const id = u.split('shorts/')[1].split('?')[0];
                return { url: `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&autoplay=0`, isDirect: false, original };
            }
            
            // Instagram
            if (u.includes('instagram.com/')) {
                let cleanUrl = u.split('?')[0];
                if (!cleanUrl.endsWith('/')) cleanUrl += '/';
                return { url: `${cleanUrl}embed/captioned/`, isDirect: false, original };
            }
            
            // TikTok
            if (u.includes('tiktok.com/')) {
                if (u.includes('/video/')) {
                    const id = u.split('/video/')[1].split('?')[0];
                    return { url: `https://www.tiktok.com/embed/v2/${id}`, isDirect: false, original };
                }
            }

            // Direct Video Extensions (Directly compatible with native <video> tag)
            const isDirectFile = u.match(/\.(mp4|webm|ogg|mov|m4v|m3u8)$/i);
            if (isDirectFile) {
                return { url: u, isDirect: true, original };
            }
            
            return { url: u, isDirect: false, original };
        }

        async function decodeData() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const storeId = urlParams.get('id');
                if (!storeId) {
                    window.location.href = "index.html";
                    return null;
                }

                const { doc, getDoc } = window.firebaseUtils;
                const docSnap = await getDoc(doc(window.db, "stores", storeId));

                if (!docSnap.exists()) return null;

                const data = docSnap.data();

                let resellerSuspended = false;
                if (data.resellerId) {
                    try {
                        const resellerSnap = await getDoc(doc(window.db, "resellers", data.resellerId));
                        if (resellerSnap.exists()) {
                            const resObj = resellerSnap.data();
                            const resExp = resObj.expiresAt ? new Date(resObj.expiresAt) : null;
                            if (resObj.status === 'blocked' || (resExp && new Date() > resExp)) {
                                resellerSuspended = true;
                            }
                        }
                    } catch (errRes) {
                        console.error("Erro ao validar parceiro-revendedor:", errRes);
                    }
                }
                
                // Lógica de Cliques e Reset Mensal
                try {
                    const { updateDoc, increment, doc } = window.firebaseUtils;
                    const now = new Date();
                    const currentMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
                    const lastReset = data.lastResetMonth || '';
                    
                    const updateObj = {};
                    const urlParams = new URLSearchParams(window.location.search);
                    const vendorCode = urlParams.get('v');

                    if (lastReset !== currentMonth) {
                        // NOVO MÊS: Reset Geral
                        console.log("Novo mês detectado. Zerando estatísticas...");
                        updateObj.clicks = 1;
                        updateObj.lastResetMonth = currentMonth;
                        
                        // Zera cliques de todos os vendedores e inicia o do vendedor atual em 1 (se houver)
                        if (data.v && data.v.length > 0) {
                            updateObj.v = data.v.map(v => ({
                                ...v,
                                clicks: (v.code === vendorCode) ? 1 : 0
                            }));
                        }
                    } else {
                        // MESMO MÊS: Incremento Normal
                        updateObj.clicks = increment(1);
                        
                        if (vendorCode && data.v && data.v.length > 0) {
                            const vendorIndex = data.v.findIndex(v => v.code === vendorCode);
                            if (vendorIndex !== -1) {
                                const newVendors = [...data.v];
                                newVendors[vendorIndex].clicks = (newVendors[vendorIndex].clicks || 0) + 1;
                                updateObj.v = newVendors;
                            }
                        }
                    }
                    
                    const { doc: storeDoc } = window.firebaseUtils;
                    await updateDoc(doc(window.db, "stores", storeId), updateObj);
                    
                    // Atualiza os dados locais para refletir a mudança imediata (opcional, estatística é vista no painel)
                    if (updateObj.clicks) data.clicks = (lastReset !== currentMonth) ? 1 : (data.clicks || 0) + 1;
                    if (updateObj.v) data.v = updateObj.v;
                } catch (e) {
                    console.error("Erro no controle de cliques:", e);
                }

                console.log("Dados do Catálogo:", data);
                const result = {
                    name: data.n,
                    isResellerSuspended: resellerSuspended || false,
                    whatsapp: data.w,
                    address: data.a,
                    instagram: data.ig,
                    facebook: data.fb,
                    website: data.ws,
                    primaryColor: data.c.startsWith('#') ? data.c : '#' + data.c,
                    secondaryColor: data.b.startsWith('#') ? data.b : '#' + data.b,
                    bannerImage: data.bi,
                    hideBannerBg: data.hb || false,
                    type: data.t || 'loja',
                    imageFormat: data.imf || 'vertical',
                    status: data.status || 'active',
                    expiresAt: data.expiresAt || data.createdAt,
                    vendors: data.v || [],
                    shippingZones: data.sh || [],
                    logo: data.lg || '',
                    subtitle: data.sub || '',
                    paymentBadgeImage: data.pmb || '',
                    pixKey: data.px || '',
                    appLink: data.al || '',
                    cf: data.cf || 0,
                    mxi: data.mxi !== undefined ? parseInt(data.mxi) : 10,
                    dxi: data.dxi !== undefined ? parseInt(data.dxi) : 3,
                    pb: data.pb || [],
                    oh: data.oh || { mode: '24h' },
                    resellerWhatsapp: data.resellerWhatsapp || '',
                    products: (() => {
                        let raw = data.p || data.products || data.items || data.produtos || data.catalogo || data.itens || data.list || data.prods || data.materiais || data.catalog || data.produtos_lista || data.itemsList || data.product_list || data.materiais_lista || (data.data && (data.data.p || data.data.products || data.data.items || data.data.produtos)) || [];

                        if (typeof raw === 'string') {
                            try { raw = JSON.parse(raw); } catch(e) { raw = []; }
                        }
                        if (raw && typeof raw === 'object' && !Array.isArray(raw)) {
                            raw = Object.values(raw);
                        }
                        if (!Array.isArray(raw)) raw = [];

                        function getVal(obj, keys) {
                            if (!obj || typeof obj !== 'object') return '';
                            for (const k of keys) {
                                if (obj[k] !== undefined && obj[k] !== null) {
                                    const str = String(obj[k]).trim();
                                    if (str !== '') return str;
                                }
                            }
                            return '';
                        }

                        return raw.map((p, pIdx) => {
                            if (!p || typeof p !== 'object') return null;

                            const nameVal = getVal(p, ['name', 'n', 'nome', 'title', 'titulo', 'material', 'item', 'produto', 'label', 'descricao_curta', 'descricaoCurta']);
                            const priceVal = getVal(p, ['price', 'p', 'preco', 'valor', 'val', 'v_unit', 'priceValue']);
                            const imageVal = getVal(p, ['image', 'i', 'imagem', 'img', 'foto', 'picture', 'url', 'imageUrl']);
                            const categoryVal = getVal(p, ['category', 'cat', 'categoria', 'grupo', 'tipo', 'catName']);
                            const descriptionVal = getVal(p, ['description', 'd', 'descricao', 'detalhes', 'obs', 'info']);
                            const videoVal = getVal(p, ['videoUrl', 'v', 'video', 'linkVideo', 'urlVideo']);

                            const finalName = nameVal || (categoryVal ? `${categoryVal} #${pIdx + 1}` : `Item Cadastrado #${pIdx + 1}`);

                            return {
                                id: p.id || Math.random().toString(36).substr(2, 9),
                                name: finalName,
                                price: priceVal,
                                wholesalePrice: p.wp !== undefined && p.wp !== null && String(p.wp).trim() !== '' ? String(p.wp) : (p.wholesalePrice || p.precoAtacado || ''),
                                wholesaleMinQty: p.wq !== undefined && p.wq !== null && String(p.wq).trim() !== '' ? String(p.wq) : (p.wholesaleMinQty || p.qtdAtacado || ''),
                                image: imageVal,
                                i2: p.i2 || p.image2 || p.img2 || p.foto2 || '',
                                i3: p.i3 || p.image3 || p.img3 || p.foto3 || '',
                                i4: p.i4 || p.image4 || p.img4 || p.foto4 || '',
                                i5: p.i5 || p.image5 || p.img5 || p.foto5 || '',
                                i6: p.i6 || p.image6 || p.img6 || p.foto6 || '',
                                videoUrl: videoVal,
                                category: categoryVal,
                                description: descriptionVal,
                                available: p.av !== false && p.available !== false && p.disponivel !== false && p.ativo !== false,
                                vars: p.vars || p.variacoes || p.variations || '',
                                sh_sizes: p.sh_sizes || p.sizes || p.tamanhos || '',
                                sh_colors: p.sh_colors || p.colors || p.cores || '',
                                f: p.f === true || p.featured === true || p.destaque === true,
                                affiliateLink: p.al || p.affiliateLink || p.link || p.urlAffiliate || ''
                            };
                        }).filter(Boolean);
                    })()
                };

                return result;
            } catch (e) { 
                console.error("Erro ao buscar dados:", e);
                return null; 
            }
        }

        function formatCurrency(value) {
            const valStr = String(value || '').trim();
            const isService = storeData && ['servicos', 'serviços', 'portfolio', 'orcamento'].includes(storeData.type);
            
            if (!valStr || valStr === '0' || valStr === '0,00' || valStr === 'undefined' || valStr === 'null') {
                return isService ? 'Sob Orçamento' : 'Consultar Preço';
            }

            // Tenta converter para número se for string formatada
            let cleanStr = valStr.replace(/[^\d,.]/g, '');
            let normalizedStr = cleanStr;
            if (normalizedStr.includes('.') && normalizedStr.includes(',')) {
                normalizedStr = normalizedStr.replace(/\./g, '').replace(',', '.');
            } else {
                normalizedStr = normalizedStr.replace(',', '.');
            }

            const num = parseFloat(normalizedStr);
            if (isNaN(num) || num === 0) return isService ? 'Sob Orçamento' : 'Consultar Preço';
            
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(num);
        }

            const product = storeData.products.find(p => p.id === productId);
            const varKey = JSON.stringify(variations);
            const existing = cart.find(item => item.id === productId && JSON.stringify(item.variations || {}) === varKey);
            
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1, variations });
            }
            updateCartUI();
            toggleCart(true);
        }

        window.checkStoreOperatingStatus = function(oh) {
            if (!oh || oh.mode === '24h') {
                return {
                    isOpen: true,
                    is24h: true,
                    text: 'Aberto 24 Horas',
                    todayName: '',
                    hoursText: '24 Horas'
                };
            }

            const now = new Date();
            const currentDay = now.getDay(); // 0 = Domingo, 1 = Segunda...
            const daysNames = ['Domingo', 'Segunda-feira', 'Terça-feira', 'Quarta-feira', 'Quinta-feira', 'Sexta-feira', 'Sábado'];
            const todayName = daysNames[currentDay];

            const dayConfig = oh.days ? (oh.days[currentDay] || oh.days[String(currentDay)]) : null;

            if (!dayConfig || !dayConfig.active) {
                return {
                    isOpen: false,
                    is24h: false,
                    text: `Fechado (${todayName})`,
                    todayName: todayName,
                    hoursText: 'Fechado hoje'
                };
            }

            const start = dayConfig.start || '08:00';
            const end = dayConfig.end || '22:00';

            const [startH, startM] = start.split(':').map(Number);
            const [endH, endM] = end.split(':').map(Number);

            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            const startMinutes = startH * 60 + startM;
            let endMinutes = endH * 60 + endM;

            let isOpen = false;
            if (endMinutes <= startMinutes) {
                isOpen = currentMinutes >= startMinutes || currentMinutes <= endMinutes;
            } else {
                isOpen = currentMinutes >= startMinutes && currentMinutes <= endMinutes;
            }

            const hoursText = `${start} às ${end}`;

            return {
                isOpen: isOpen,
                is24h: false,
                text: isOpen ? `Aberto agora (${hoursText})` : `Fechado agora (Abre às ${start})`,
                todayName: todayName,
                hoursText: hoursText
            };

                `;
            } else {
                const activeDays = daysNames.map((dName, idx) => {
                    const isToday = idx === currentDay;
                    const dayConf = oh.days ? (oh.days[idx] || oh.days[String(idx)]) : null;
                    const isActive = dayConf && dayConf.active;

        function checkout() {
            const statusInfo = window.checkStoreOperatingStatus(storeData.oh);
            if (!statusInfo.isOpen) {
                alert(`O estabelecimento está FECHADO no momento e não está aceitando novos pedidos.\n\nStatus: ${statusInfo.text}\n\nPor favor, retorne no nosso horário de funcionamento para concluir o seu pedido!`);
                window.openOperatingHoursModal();
                return;
            }

            let message = `*Novo Pedido - ${storeData.name}*\n\n`;
            
            // Adiciona vendedor se existir
            const urlParams = new URLSearchParams(window.location.search);
            const vendorCode = urlParams.get('v');
            if (vendorCode) {
                // Tenta encontrar o nome do vendedor nos dados da loja
                const vendorObj = (storeData.vendors || []).find(v => v.code === vendorCode);
                message += `*Vendedor:* ${vendorObj ? vendorObj.name : vendorCode}\n\n`;
            }

            let total = 0;
            cart.forEach(item => {
                const isWholesale = item.wholesaleMinQty && item.quantity >= item.wholesaleMinQty;
                const priceToUse = isWholesale ? item.wholesalePrice : item.price;
                const subtotal = parseFloat(String(priceToUse || '0').replace(',', '.')) * item.quantity;
                total += subtotal;
                const priceDisplay = formatCurrency(priceToUse);
                const vars = Object.entries(item.variations || {}).map(([k, v]) => `${k}: ${v}`).join(', ');
                message += `- ${item.quantity}x ${item.name} ${vars ? `[${vars}]` : ''} (${priceDisplay})${isWholesale ? ' *[ATACADO]*' : ''}\n`;
            });

            if (selectedShippingZone) {
                const shippingPrice = parseFloat(String(selectedShippingZone.price || '0').replace(',', '.'));
                message += `\n*Entrega:* ${selectedShippingZone.neighborhood} (+ ${formatCurrency(shippingPrice)})`;
                total += shippingPrice;
            }

            const cardFeePercentage = storeData.cf ? parseFloat(storeData.cf) : 0;
            const maxInstallments = storeData.mxi ? parseInt(storeData.mxi) : 10;

            if (selectedPaymentMethod === 'card') {
                selectedInstallment = maxInstallments;
            } else {
                selectedInstallment = 1;
            }

            let activeFee = 0;
            if (selectedPaymentMethod === 'card') {
                if (selectedInstallment >= 4) {
                    activeFee = cardFeePercentage + (selectedInstallment - 4) * 1.5;
                }
            }
            const finalTotal = activeFee > 0 ? (total * (1 + activeFee / 100)) : total;

            if (selectedPaymentMethod === 'pix') {
                message += `\n\n*Forma de Pagamento:* PIX ⚡`;
                if (storeData.pixKey) {
                    message += `\n*Chave PIX:* ${storeData.pixKey}`;
                }
                message += `\n\n*Total: ${formatCurrency(finalTotal)}*`;
            } else if (selectedPaymentMethod === 'cash') {
                message += `\n\n*Forma de Pagamento:* Dinheiro 💵`;
                message += `\n\n*Total: ${formatCurrency(finalTotal)}*`;
            } else {
                const installmentValue = finalTotal / selectedInstallment;
                message += `\n\n*Forma de Pagamento:* Cartão de Crédito 💳`;
                if (selectedInstallment <= 3) {
                    message += `\n*Opção Selecionada:* ${selectedInstallment}x de ${formatCurrency(installmentValue)} *[Sem Juros]*`;
                } else {
                    message += `\n*Opção Selecionada:* ${selectedInstallment}x de ${formatCurrency(installmentValue)}`;
                    message += `\n*Taxa Aplicada:* ${activeFee.toFixed(1)}% de acréscimo`;
                }
                message += `\n\n*Total no Cartão: ${formatCurrency(finalTotal)}*`;
                message += `\n\n_(Favor enviar o link de pagamento no valor exato)_`;
            }
            
            let whatsapp = storeData.whatsapp.replace(/\D/g, '');
            if (whatsapp.length <= 11) whatsapp = '55' + whatsapp;
            window.openResilientWhatsApp(whatsapp, message);
        }

        // Carrossel de Banners Promocionais (Movimentos e Slideshow)
        window.currentPromoSlide = 0;

        window.slidePromoCarousel = function(direction) {
            const el = document.getElementById('promo-carousel');
            if (!el) return;
            const bannersCount = el.children.length;
            if (bannersCount <= 1) return;
            
            window.currentPromoSlide = (window.currentPromoSlide + direction + bannersCount) % bannersCount;
            window.goToPromoSlide(window.currentPromoSlide);
        }

        window.goToPromoSlide = function(slideIndex) {
            const el = document.getElementById('promo-carousel');
            if (!el) return;
            const itemWidth = el.offsetWidth;
            isProgramScroll = true;
            el.scrollTo({
                left: slideIndex * itemWidth,
                behavior: 'smooth'
            });
            window.currentPromoSlide = slideIndex;
            
            // Sincroniza dots indicators
            const bannersCount = el.children.length;
            for (let i = 0; i < bannersCount; i++) {
                const dot = document.getElementById(`promo-dot-${i}`);
                if (dot) {
                    if (i === slideIndex) {
                        dot.classList.remove('bg-white/40', 'hover:bg-white/60');
                        dot.classList.add('bg-white', 'scale-125');
                    } else {
                        dot.classList.add('bg-white/40', 'hover:bg-white/60');
                        dot.classList.remove('bg-white', 'scale-125');
                    }
                }
            }
            setTimeout(() => { isProgramScroll = false; }, 600);
        }

        window.initPromoCarouselAutoPlay = function() {
            const el = document.getElementById('promo-carousel');
            if (!el || el.children.length <= 1) return;
            
            // Escuta rolagem de toque no mobile para atualizar indicador
            el.addEventListener('scroll', () => {
                if (isProgramScroll) return;
                const index = Math.round(el.scrollLeft / el.offsetWidth);
                if (window.currentPromoSlide !== index && index < el.children.length) {
                    window.currentPromoSlide = index;
                    for (let i = 0; i < el.children.length; i++) {
                        const dot = document.getElementById(`promo-dot-${i}`);
                        if (dot) {
                            if (i === index) {
                                dot.classList.remove('bg-white/40', 'hover:bg-white/60');
                                dot.classList.add('bg-white', 'scale-125');
                            } else {
                                dot.classList.add('bg-white/40', 'hover:bg-white/60');
                                dot.classList.remove('bg-white', 'scale-125');
                            }
                        }
                    }
                }
            }, { passive: true });

            if (window.promoCarouselInterval) clearInterval(window.promoCarouselInterval);
            window.promoCarouselInterval = setInterval(() => {
                window.slidePromoCarousel(1);
            }, 8000);
        }

        window.dismissAITrigger = function() {

                trigger.classList.add('scale-0', 'opacity-0', 'pointer-events-none');
                sessionStorage.setItem('ai_trigger_dismissed', 'true');
            }
        };

        function toggleAI(show) {
            aiOpen = show;
            const widget = document.getElementById('ai-attendant');
            const trigger = document.getElementById('ai-trigger');
            
            if(show) {
                widget.style.display = 'block';
                if(trigger) {
                    trigger.classList.add('scale-0', 'opacity-0', 'pointer-events-none');
                }
                setTimeout(() => {
                    widget.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
                    document.getElementById('ai-input').focus();
                }, 10);
            } else {
                widget.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
                if(trigger && sessionStorage.getItem('ai_trigger_dismissed') !== 'true') {
                    trigger.classList.remove('scale-0', 'opacity-0', 'pointer-events-none');
                }
                setTimeout(() => { if(!aiOpen) widget.style.display = 'none'; }, 500);
            }
        }

            const messages = document.getElementById('ai-messages');
            const div = document.createElement('div');
            div.className = type === 'user' 
                ? 'bg-slate-900 text-white p-3 rounded-2xl rounded-tr-none text-xs font-bold self-end shadow-md max-w-[80%]'
                : 'bg-white border border-slate-200 text-slate-700 p-3 rounded-2xl rounded-tl-none text-xs font-medium self-start shadow-sm max-w-[80%] flex flex-col gap-2';
            
            const textSpan = document.createElement('span');
            textSpan.textContent = text;
            div.appendChild(textSpan);

            if(productLink) {
                const btn = document.createElement('button');
                btn.className = 'mt-1 bg-[#25D366] text-slate-900 text-[10px] font-black uppercase py-2 px-3 rounded-xl hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-1 shadow-sm';

                btn.onclick = () => {
                    openProductModal(productLink.id);
                    toggleAI(false);
                };
                div.appendChild(btn);
                setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 0);
            }

            if(actionType === 'whatsapp') {
                const btn = document.createElement('button');
                btn.className = 'mt-1.5 bg-gradient-to-r from-emerald-500 to-[#25D366] hover:from-emerald-600 hover:to-[#22c35e] text-slate-900 duration-200 px-4 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-wider flex items-center gap-1.5 self-start active-scale shadow-md shadow-emerald-500/20 border border-emerald-450/20';
                btn.innerHTML = `<i data-lucide="phone" class="w-4 h-4"></i> Chamar Atendente`;
                btn.onclick = () => {
                    let whatsapp = (storeData && storeData.whatsapp) ? storeData.whatsapp.replace(/\D/g, '') : '';
                    if (whatsapp.length <= 11 && whatsapp.length > 0) whatsapp = '55' + whatsapp;
                    window.openResilientWhatsApp(whatsapp, "Olá! Vim do assistente do seu catálogo e gostaria de esclarecer dúvidas.");
                };
                div.appendChild(btn);
                setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 0);
            }

            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        window.triggerQuickAction = function(action) {
            if (action === 'whatsapp') {
                appendMessage("Quero falar no WhatsApp / Falar com Atendente", 'user');
                setTimeout(() => {
                    appendMessage("Claro! Você pode falar diretamente com o atendente humano clicando no botão abaixo para tirar dúvidas ou fazer seu pedido pelo WhatsApp:", 'bot', null, 'whatsapp');
                }, 300);
            } else if (action === 'pagamento') {
                appendMessage("Quais as formas de pagamento?", 'user');
                setTimeout(() => {
                    const resp = findResponse("pagamento");
                    appendMessage(resp.text, 'bot', resp.product, resp.action);
                }, 300);
            } else if (action === 'frete') {
                appendMessage("Como funciona a entrega / frete?", 'user');
                setTimeout(() => {
                    const resp = findResponse("entrega");
                    appendMessage(resp.text, 'bot', resp.product, resp.action);
                }, 300);
            }
        }

        function findResponse(query) {
            const queryLower = query.toLowerCase().trim();
            const products = window.fullCatalog || [];

            // 0. PRIORIDADE EXTRA: Contato, suporte, whatsapp, atendente, ajuda etc.
            const contactKeys = ['contato', 'whatsapp', 'zap', 'telefone', 'falar', 'conversar', 'suporte', 'ajuda', 'duvida', 'dúvida', 'vendedor', 'humano', 'ligar', 'chamar', 'atendente', 'comprar', 'pedir', 'informacao', 'informações', 'mensagens'];
            if (contactKeys.some(key => queryLower.includes(key))) {
                return {
                    text: "Você pode falar diretamente conosco via WhatsApp de forma simples, rápida e personalizada! Clique no botão abaixo para iniciar a conversa com o nosso time de suporte e tirar todas as suas dúvidas:",
                    action: 'whatsapp'
                };
            }

            // 1. PRIORIDADE: Busca de Produtos
            const matches = products.filter(p => {
                const name = (p.name || '').toLowerCase();
                const desc = (p.description || '').toLowerCase();
                // Busca se o nome do produto está contido na pergunta ou vice-versa (mínimo 3 caracteres para evitar falsos positivos)
                return queryLower.length >= 3 && (name.includes(queryLower) || queryLower.includes(name));
            });

            if(matches.length > 0) {
                const p = matches[0];
                const price = typeof formatCurrency === 'function' ? formatCurrency(p.price) : `R$ ${p.price}`;
                return {
                    text: `Sim! Temos "${p.name}" por apenas ${price}. Clique no botão abaixo para ver as fotos e detalhes:`,
                    product: p
                };
            }

            // 2. FAQ (Banco de Conhecimento)
            const knowledgeBase = [
                {
                    keys: ['pagamento', 'paga', 'pix', 'cartao', 'cartão', 'dinheiro', 'taxa', 'parcela'],
                    response: "Aceitamos PIX, Dinheiro e Cartão. No cartão, aplicamos a taxa da maquininha. Você pode parcelar suas compras também!"
                },
                {
                    keys: ['entrega', 'frete', 'envia', 'recebe', 'chega', 'correio', 'retirada'],
                    response: "Entregamos em toda a região! O frete é calculado com base no seu endereço. Você também pode combinar a retirada se preferir."
                },
                {
                    keys: ['horario', 'aberto', 'funciona', 'atendimento', 'horas'],
                    response: "Nosso catálogo online funciona 24h! Para suporte humano via WhatsApp, atendemos em horário comercial."
                },
                {
                    keys: ['confiavel', 'seguro', 'golpe', 'garantia'],
                    response: "Sim! Somos uma loja verificada. Você faz o pedido pelo catálogo e finaliza o pagamento diretamente com o vendedor via WhatsApp."
                },
                {
                    keys: ['tamanho', 'medida', 'p', 'm', 'g', 'gg', 'numero'],
                    response: "Trabalhamos com diversos tamanhos. Você pode ver os detalhes na descrição de cada produto clicando sobre a foto."
                }
            ];

            // Busca no FAQ com precisão (evita que 'g' de 'gravação' ative o FAQ de tamanhos)
            for (const item of knowledgeBase) {
                if (item.keys.some(key => {
                    if (key.length <= 2) {
                        // Para chaves curtas como p, g, m, usa regex de palavra inteira
                        const regex = new RegExp(`\\b${key}\\b`, 'i');
                        return regex.test(queryLower);
                    }
                    return queryLower.includes(key);
                })) {
                    return { text: item.response };
                }
            }

            // 3. Navegação
            if(queryLower.includes('ver tudo') || queryLower.includes('loja') || queryLower.includes('catalogo') || queryLower.includes('catálogo')) {
                return { text: "Você pode navegar pelas categorias no topo da página para ver todos os nossos produtos!" };
            }

            return { text: "Ainda não tenho essa informação, mas se digitar o nome de um produto, eu tento encontrar para você! Também sei sobre pagamentos e entregas." };
        }

        async function askAI() {
            const input = document.getElementById('ai-input');
            const query = input.value.trim();
            if(!query) return;

            appendMessage(query, 'user');
            input.value = '';

            setTimeout(() => {
                const responseObj = findResponse(query);
                appendMessage(responseObj.text, 'bot', responseObj.product, responseObj.action);
            }, 400);
        }

        // Mostrar o botão após carregar
        window.addEventListener('load', () => {
            const isAffiliate = storeData && storeData.type === 'afiliados';
            if (isAffiliate) return; // Não mostra IA se for afiliado
            if (sessionStorage.getItem('ai_trigger_dismissed') === 'true') return; // Se já minimizou/recolheu, não mostra
            
            setTimeout(() => {
                const trigger = document.getElementById('ai-trigger');
                if (trigger) {
                    trigger.classList.remove('hidden', 'opacity-0', 'pointer-events-none');
                }
                if (window.lucide) lucide.createIcons();
            }, 2000);
        });

        // Enviar com Enter
        document.getElementById('ai-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') askAI();
        });
    </script>
</body>
</html>
