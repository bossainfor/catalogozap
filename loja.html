<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Carregando Catálogo...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJaxRdA6uzbN41JvAw8xO7F5mzJaDfMBc",
            authDomain: "gen-lang-client-0664324166.firebaseapp.com",
            projectId: "gen-lang-client-0664324166",
            storageBucket: "gen-lang-client-0664324166.firebasestorage.app",
            messagingSenderId: "1074933311707",
            appId: "1:1074933311707:web:d841b61f84c05a40fc04fe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "ai-studio-2395f72f-4dac-4517-9681-c654cd1a03ca");

        window.db = db;
        window.firebaseUtils = { doc, getDoc };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .cart-drawer { transform: translateX(100%); transition: transform 0.3s ease-in-out; }
        .cart-drawer.open { transform: translateX(0); }
        .overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .overlay.open { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="bg-white text-slate-900">
    <div id="app">
        <div class="min-h-screen flex items-center justify-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500"></div>
        </div>
    </div>

    <div id="overlay" class="overlay fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50" onclick="toggleCart(false)"></div>
    <div id="cart-drawer" class="cart-drawer fixed top-0 right-0 h-full w-full sm:max-w-md bg-white z-50 shadow-2xl flex flex-col">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between">
            <h2 class="text-xl font-black uppercase italic tracking-tighter">Seu Carrinho</h2>
            <button onclick="toggleCart(false)" class="p-3 hover:bg-slate-100 rounded-full transition-colors"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
        <div id="cart-footer" class="p-6 border-t border-slate-100 bg-slate-50 space-y-4"></div>
    </div>

    <button id="cart-fab" onclick="toggleCart(true)" class="hidden fixed bottom-6 right-6 sm:bottom-8 sm:right-8 text-white p-5 rounded-full shadow-2xl z-40 flex items-center justify-center active:scale-95 transition-transform">
        <i data-lucide="shopping-cart" size="28"></i>
        <span id="cart-count" class="absolute -top-1 -right-1 bg-slate-900 text-white text-[10px] font-bold w-6 h-6 rounded-full flex items-center justify-center border-2 border-white">0</span>
    </button>

    <script>
        let storeData = null;
        let cart = [];

        // Proxy de Imagem (Simplificado e Direto)
        function proxyImg(url) {
            if (!url) return '';
            let u = url.trim();
            
            // Se for link do Firebase, não precisa de proxy
            if (u.includes('firebasestorage.googleapis.com')) return u;

            // Se for link de visualizador, tenta corrigir (mas o ideal é o link direto)
            if (u.includes('ibb.co/') && !u.includes('i.ibb.co/')) {
                u = u.replace('ibb.co/', 'i.ibb.co/') + '.png'; 
            }
            if (u.includes('postimg.cc/') && !u.includes('i.postimg.cc/')) {
                u = u.replace('postimg.cc/', 'i.postimg.cc/') + '/image.png';
            }

            if (!u.startsWith('http')) u = 'https://' + u;
            
            // Retorna o link direto sem atravessadores
            return u;
        }

        async function decodeData() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const storeId = urlParams.get('id');
                if (!storeId) return null;

                const { doc, getDoc } = window.firebaseUtils;
                const docSnap = await getDoc(doc(window.db, "stores", storeId));

                if (!docSnap.exists()) return null;

                const data = docSnap.data();
                console.log("Dados brutos do Firestore:", data);
                return {
                    name: data.n,
                    whatsapp: data.w,
                    address: data.a,
                    instagram: data.ig,
                    facebook: data.fb,
                    primaryColor: data.c.startsWith('#') ? data.c : '#' + data.c,
                    secondaryColor: data.b.startsWith('#') ? data.b : '#' + data.b,
                    bannerImage: data.bi,
                    type: data.t,
                    status: data.status || 'active',
                    expiresAt: data.expiresAt || data.createdAt,
                    products: (data.p || []).map(p => ({
                        id: p.id || Math.random().toString(36).substr(2, 9),
                        name: p.n,
                        price: p.p,
                        wholesalePrice: p.wp || '',
                        wholesaleMinQty: p.wq || '',
                        image: p.i,
                        description: p.d || ''
                    }))
                };
            } catch (e) { 
                console.error("Erro ao buscar dados:", e);
                return null; 
            }
        }

        function formatCurrency(value) {
            const valStr = String(value || '').trim();
            if (!valStr || valStr === '0' || valStr === '0,00' || valStr === 'undefined' || valStr === 'null') {
                return 'Peça Orçamento';
            }
            const num = typeof value === 'string' ? parseFloat(value.replace(',', '.')) : value;
            if (isNaN(num) || num === 0) return 'Peça Orçamento';
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(num);
        }

        function toggleCart(open) {
            document.getElementById('cart-drawer').classList.toggle('open', open);
            document.getElementById('overlay').classList.toggle('open', open);
        }

        function addToCart(productId) {
            const product = storeData.products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            if (existing) existing.quantity++;
            else cart.push({ ...product, quantity: 1 });
            updateCartUI();
            toggleCart(true);
        }

        function updateQuantity(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) item.quantity = Math.max(1, item.quantity + delta);
            updateCartUI();
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const itemsContainer = document.getElementById('cart-items');
            const footerContainer = document.getElementById('cart-footer');
            const fab = document.getElementById('cart-fab');
            const countBadge = document.getElementById('cart-count');

            const totalItems = cart.reduce((acc, item) => acc + item.quantity, 0);
            countBadge.innerText = totalItems;
            fab.classList.toggle('hidden', totalItems === 0);
            fab.style.backgroundColor = storeData.primaryColor;

            if (cart.length === 0) {
                itemsContainer.innerHTML = '<p class="text-center text-slate-400">Carrinho vazio</p>';
                footerContainer.innerHTML = '';
            } else {
                let total = 0;
                itemsContainer.innerHTML = cart.map(item => {
                    const isWholesale = item.wholesaleMinQty && item.quantity >= item.wholesaleMinQty;
                    const priceToUse = isWholesale ? item.wholesalePrice : item.price;
                    const subtotal = parseFloat((priceToUse || '0').replace(',', '.')) * item.quantity;
                    total += subtotal;

                    return `
                        <div class="flex gap-4 items-start bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <img src="${proxyImg(item.image)}" class="w-16 h-16 rounded-lg object-cover" referrerpolicy="no-referrer">
                            <div class="flex-1">
                                <h4 class="font-bold text-sm">${item.name}</h4>
                                <div class="flex items-center gap-2">
                                    <p class="text-xs font-bold" style="color: ${isWholesale ? '#f97316' : storeData.primaryColor}">${formatCurrency(priceToUse)}</p>
                                    ${isWholesale ? '<span class="text-[8px] bg-orange-100 text-orange-600 px-1.5 py-0.5 rounded font-black uppercase">Atacado</span>' : ''}
                                </div>
                                <div class="flex items-center gap-2 mt-2">
                                    <button onclick="updateQuantity('${item.id}', -1)" class="w-6 h-6 bg-white border border-slate-200 rounded flex items-center justify-center">-</button>
                                    <span class="text-xs font-bold">${item.quantity}</span>
                                    <button onclick="updateQuantity('${item.id}', 1)" class="w-6 h-6 bg-white border border-slate-200 rounded flex items-center justify-center">+</button>
                                </div>
                            </div>
                            <button onclick="removeFromCart('${item.id}')" class="text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    `;
                }).join('');

                footerContainer.innerHTML = `
                    <div class="flex justify-between font-bold mb-4">
                        <span class="text-slate-400 uppercase text-[10px] tracking-widest">Total</span>
                        <span class="text-xl font-black tracking-tighter">${formatCurrency(total)}</span>
                    </div>
                    <button onclick="checkout()" class="w-full py-4 text-white font-black uppercase italic tracking-widest text-sm rounded-2xl shadow-lg transition-all active:scale-95" style="background-color: ${storeData.primaryColor}">Finalizar no WhatsApp</button>
                `;
            }
            lucide.createIcons();
        }

        function checkout() {
            let message = `*Novo Pedido - ${storeData.name}*\n\n`;
            let total = 0;
            cart.forEach(item => {
                const isWholesale = item.wholesaleMinQty && item.quantity >= item.wholesaleMinQty;
                const priceToUse = isWholesale ? item.wholesalePrice : item.price;
                const subtotal = parseFloat((priceToUse || '0').replace(',', '.')) * item.quantity;
                total += subtotal;
                const priceDisplay = formatCurrency(priceToUse);
                message += `- ${item.quantity}x ${item.name} (${priceDisplay})${isWholesale ? ' *[ATACADO]*' : ''}\n`;
            });
            message += `\n*Total: ${formatCurrency(total)}*`;
            window.open(`https://wa.me/55${storeData.whatsapp}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function requestQuote(productId) {
            const product = storeData.products.find(p => p.id === productId);
            const message = `*Pedido de Orçamento - ${storeData.name}*\n\nOlá! Gostaria de solicitar um orçamento para o serviço:\n*${product.name}*\n\nAguardo seu retorno!`;
            window.open(`https://wa.me/55${storeData.whatsapp}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function renderStore() {
            const urlParams = new URLSearchParams(window.location.search);
            const app = document.getElementById('app');
            if (!storeData) {
                app.innerHTML = '<div class="p-8 text-center"><h1 class="text-xl font-bold">Link Inválido</h1><a href="criar.html" class="text-orange-500">Criar Catálogo</a></div>';
                return;
            }

            // Verificação de Expiração
            const now = new Date();
            const expiresAt = new Date(storeData.expiresAt || storeData.createdAt);
            const isExpired = now > expiresAt;
            const isBlocked = storeData.status === 'blocked';

            if (isExpired || isBlocked) {
                app.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-slate-50">
                        <div class="bg-white p-10 rounded-3xl shadow-2xl border border-slate-100 max-w-md w-full space-y-6">
                            <div class="bg-red-100 text-red-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto">
                                <i data-lucide="lock" class="w-10 h-10"></i>
                            </div>
                            <h1 class="text-2xl font-black uppercase italic tracking-tighter">Catálogo Suspenso</h1>
                            <p class="text-slate-500 font-medium leading-relaxed">
                                O período de teste ou a mensalidade deste catálogo expirou. Para reativar e continuar vendendo, entre em contato com o suporte.
                            </p>
                            <a href="https://wa.me/5585992862177?text=Olá! Meu catálogo ${storeData.name} expirou e quero reativar." 
                               class="block w-full py-4 bg-green-500 text-white font-black uppercase italic tracking-widest rounded-2xl hover:bg-green-600 transition-all shadow-lg">
                                <i data-lucide="phone" class="inline-block mr-2 w-4.5 h-4.5"></i> Falar com Suporte
                            </a>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">ID: ${urlParams.get('id')}</p>
                        </div>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            document.title = storeData.name;
            console.log("Renderizando loja:", storeData);

            // Lógica de Botão por Nicho
            const isService = storeData.type === 'servicos' || storeData.type === 'portfolio';
            const btnText = isService ? 'Pedir Orçamento' : 'Comprar';
            const btnAction = isService ? 'requestQuote' : 'addToCart';
            const btnIcon = isService ? 'message-circle' : 'shopping-cart';

            const productsHTML = storeData.products.map(p => `
                <div class="bg-white rounded-xl sm:rounded-2xl overflow-hidden border border-slate-100 shadow-sm hover:shadow-md transition-shadow flex flex-col">
                    <div class="relative overflow-hidden bg-slate-50 w-full" style="aspect-ratio: 9/16 !important;">
                        <img src="${proxyImg(p.image)}" class="absolute inset-0 w-full h-full object-cover hover:scale-105 transition-transform duration-500" referrerpolicy="no-referrer" onerror="this.onerror=null; this.src='https://picsum.photos/seed/'+Math.random()+'/400/700'; console.log('Erro ao carregar imagem:', '${p.image}')">
                    </div>
                    <div class="p-3 sm:p-5 flex flex-col flex-1">
                        <h3 class="font-bold text-sm sm:text-lg mb-1 line-clamp-2 leading-tight h-10 sm:h-auto">${p.name}</h3>
                        ${p.description ? `<p class="hidden sm:block text-slate-500 text-xs mb-3 line-clamp-2">${p.description}</p>` : ''}
                        <div class="mt-auto">
                            ${!isService ? `<p class="font-black text-base sm:text-xl mb-3" style="color: ${storeData.primaryColor}">${formatCurrency(p.price)}</p>` : ''}
                            <button onclick="${btnAction}('${p.id}')" class="w-full py-2.5 sm:py-4 text-white font-bold rounded-lg sm:rounded-xl text-[10px] sm:text-base uppercase tracking-widest italic flex items-center justify-center gap-2" style="background-color: ${storeData.primaryColor}">
                                <i data-lucide="${btnIcon}" class="w-3 h-3 sm:w-5 sm:h-5"></i>
                                <span>${btnText}</span>
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');

            app.innerHTML = `
                <div class="min-h-screen bg-white flex flex-col">
                    <div class="relative py-12 sm:py-20 px-6 text-center overflow-hidden" style="background-color: ${storeData.secondaryColor}; color: #ffffff">
                        ${storeData.bannerImage ? `<img src="${proxyImg(storeData.bannerImage)}" class="absolute inset-0 w-full h-full object-cover opacity-30 z-0" referrerpolicy="no-referrer">` : ''}
                        <div class="relative z-10">
                            <h1 class="text-3xl sm:text-5xl md:text-6xl font-black italic uppercase tracking-tighter mb-4">${storeData.name}</h1>
                            <div class="inline-flex items-center gap-2 bg-white/20 px-4 py-2 rounded-full text-[10px] sm:text-xs font-bold uppercase tracking-widest">
                                <i data-lucide="smartphone" class="w-3.5 h-3.5"></i> Pedidos via WhatsApp
                            </div>
                        </div>
                    </div>

                    <main class="max-w-6xl mx-auto px-3 sm:px-6 py-6 sm:py-10 grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-8 flex-1 w-full">
                        ${productsHTML}
                    </main>

                    <footer class="bg-slate-900 text-white py-12 px-6 mt-10">
                        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                            <div class="text-center md:text-left space-y-4">
                                <h2 class="text-2xl font-black italic uppercase tracking-tighter">${storeData.name}</h2>
                                ${storeData.address ? `<p class="text-slate-400 text-sm flex items-center justify-center md:justify-start gap-2"><i data-lucide="map-pin" class="w-4 h-4"></i> ${storeData.address}</p>` : ''}
                            </div>

                            <div class="flex flex-col items-center md:items-end gap-4">
                                <div class="flex gap-4">
                                    ${(storeData.instagram && String(storeData.instagram).trim() !== '' && String(storeData.instagram) !== 'undefined') ? `
                                        <a href="${String(storeData.instagram).includes('instagram.com') ? (String(storeData.instagram).startsWith('http') ? storeData.instagram : 'https://' + storeData.instagram) : 'https://instagram.com/' + String(storeData.instagram).replace('@', '').trim()}" target="_blank" class="p-3 bg-white/10 rounded-full hover:bg-white/20 transition-all flex items-center justify-center text-white" title="Instagram">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-instagram"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
                                        </a>
                                    ` : ''}
                                    ${(storeData.facebook && String(storeData.facebook).trim() !== '' && String(storeData.facebook) !== 'undefined') ? `
                                        <a href="${String(storeData.facebook).includes('facebook.com') ? (String(storeData.facebook).startsWith('http') ? storeData.facebook : 'https://' + storeData.facebook) : 'https://facebook.com/' + String(storeData.facebook).trim()}" target="_blank" class="p-3 bg-white/10 rounded-full hover:bg-white/20 transition-all flex items-center justify-center text-white" title="Facebook">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-facebook"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
                                        </a>
                                    ` : ''}
                                    <a href="https://wa.me/55${storeData.whatsapp}" target="_blank" class="p-3 bg-white/10 rounded-full hover:bg-white/20 transition-all flex items-center justify-center text-white" title="WhatsApp">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-phone"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                                    </a>
                                </div>
                                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Desenvolvido por Bossa Infor</p>
                            </div>
                        </div>
                    </footer>
                </div>
            `;
            
            // Força a renderização dos ícones várias vezes para garantir
            if (window.lucide) {
                lucide.createIcons();
                setTimeout(() => lucide.createIcons(), 500);
                setTimeout(() => lucide.createIcons(), 2000);
            }
        }

        window.onload = async () => {
            // Aguarda o script do Lucide carregar se necessário
            if (!window.lucide) {
                await new Promise(r => setTimeout(r, 500));
            }
            
            // Aguarda um pouco para o Firebase inicializar
            let attempts = 0;
            while (!window.firebaseUtils && attempts < 50) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }
            
            storeData = await decodeData();
            renderStore();
        };
    </script>
</body>
</html>
