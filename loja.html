    <script>
        let storeData = null;
        let cart = [];
        let selectedCategory = 'Todos';
        let searchQuery = '';
        let currentVariations = {};
        let selectedShippingZone = null;

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            lucide.createIcons();
        }

        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        setInterval(() => {
            const timers = document.querySelectorAll('[data-countdown]');
            timers.forEach(timer => {
                const end = new Date(timer.dataset.countdown).getTime();
                const now = new Date().getTime();
                const diff = end - now;
                if (diff <= 0) {
                    timer.innerHTML = "OFERTA ENCERRADA";
                    return;
                }
                const h = Math.floor(diff / (1000 * 60 * 60));
                const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((diff % (1000 * 60)) / 1000);
                timer.innerHTML = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            });
        }, 1000);

        window.selectVariation = function(label, value, btn) {
            currentVariations[label] = value;
            const parent = btn.parentElement;
            parent.querySelectorAll('.var-btn').forEach(b => {
                b.classList.remove('bg-orange-50', 'text-orange-600', 'dark:bg-orange-900/20');
                b.style.borderColor = '';
            });
            btn.classList.add('bg-orange-50', 'text-orange-600', 'dark:bg-orange-900/20');
            btn.style.borderColor = storeData.primaryColor;
        }

        window.openProductModal = function(productId) {
            if (window._isOpeningModal) return;
            window._isOpeningModal = true;
            setTimeout(() => window._isOpeningModal = false, 200);

            console.log("Chamando modal para:", productId);
            const product = storeData.products.find(p => p.id === productId);
            if (!product) {
                console.error("Produto não encontrado:", productId);
                return;
            }

            // Garante que o catálogo completo esteja disponível para o assistente IA
            if (!window.fullCatalog && storeData.products) window.fullCatalog = storeData.products;

            const modal = document.getElementById('product-modal');
            const overlay = document.getElementById('overlay');
            
            const mediaCont = document.getElementById('modal-media-container');
            const imageUrl = proxyImg(product.image);
            const videoUrl = product.videoUrl ? getEmbedUrl(product.videoUrl) : null;
            const hasMediaSwipe = imageUrl && videoUrl;

            let mediaHTML = `<button onclick="closeModal()" class="md:hidden absolute top-4 right-4 z-[1020] bg-black/40 text-white p-3 rounded-full backdrop-blur-md active-scale transition-all touch-manipulation"><i data-lucide="x" class="w-6 h-6"></i></button>`;
            
            if (hasMediaSwipe) {
                const swiperId = `modal-swiper-${product.id}`;
                mediaHTML += `
                    <div id="${swiperId}" onscroll="updateDots('${swiperId}')" class="media-swiper absolute inset-0 flex overflow-x-auto snap-x snap-mandatory scroll-smooth w-full h-full bg-slate-950">
                        <div class="snap-start flex-shrink-0 w-full h-full relative flex items-center justify-center bg-slate-950">
                            <img src="${imageUrl}" class="w-full h-full object-contain">
                        </div>
                        <div class="snap-start flex-shrink-0 w-full h-full relative bg-slate-950 flex items-center justify-center">
                            <div class="video-wrapper">
                                <iframe src="${videoUrl}" frameborder="0" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                            </div>
                        </div>
                    </div>
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 z-30">
                        <button onclick="document.getElementById('${swiperId}').scrollBy({left: -document.getElementById('${swiperId}').offsetWidth, behavior: 'smooth'})" class="p-3 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-full text-white border border-white/10 active-scale"><i data-lucide="chevron-left"></i></button>
                    </div>
                    <div class="absolute inset-y-0 right-0 flex items-center pr-4 z-30">
                        <button onclick="document.getElementById('${swiperId}').scrollBy({left: document.getElementById('${swiperId}').offsetWidth, behavior: 'smooth'})" class="p-3 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-full text-white border border-white/10 active-scale"><i data-lucide="chevron-right"></i></button>
                    </div>
                    <div class="absolute bottom-6 left-1/2 -translate-x-1/2 z-30 flex gap-2.5" id="dots-${swiperId}">
                        <div class="w-2.5 h-2.5 rounded-full bg-white shadow-xl border border-white/20 transition-all"></div>
                        <div class="w-2.5 h-2.5 rounded-full bg-white/30 shadow-sm transition-all border border-transparent"></div>
                    </div>
                `;
            } else if (videoUrl) {
                mediaHTML += `<div class="video-wrapper"><iframe src="${videoUrl}" frameborder="0" allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>`;
            } else {
                mediaHTML += `<div class="w-full h-full flex items-center justify-center bg-slate-950 px-4 md:px-0"><img src="${imageUrl}" class="w-full h-full object-contain selection:bg-none"></div>`;
            }
            mediaCont.innerHTML = mediaHTML;

            document.getElementById('modal-title').innerText = product.name;
            document.getElementById('modal-price').innerText = formatCurrency(product.price);
            document.getElementById('modal-price').style.color = storeData.primaryColor;
            document.getElementById('modal-desc').innerText = product.description || 'Este item ainda não possui uma descrição detalhada disponível.';
            
            const badgeCont = document.getElementById('modal-badge-container');
            badgeCont.innerHTML = '';
            if (product.badge) {
                badgeCont.innerHTML = `<span class="bg-orange-500 text-white text-[10px] font-black uppercase px-4 py-1.5 rounded-lg shadow-lg shadow-orange-500/20">${product.badge}</span>`;
            }

            const variationsCont = document.getElementById('variations-container');
            variationsCont.innerHTML = '';
            currentVariations = {};

            const options = [];
            
            // NOVO SISTEMA DE VARIAÇÕES (#4): Suporta Grupos (Ex: Tamanho: P, M | Cor: Azul, Vermelho)
            if (product.vars) {
                const groups = product.vars.split('|');
                groups.forEach(group => {
                    if (group.includes(':')) {
                        const [label, valuesStr] = group.split(':');
                        const values = valuesStr.split(',').map(v => v.trim()).filter(v => v !== '');
                        if (values.length > 0) {
                            options.push({ label: label.trim(), values });
                        }
                    } else {
                        const values = group.split(',').map(v => v.trim()).filter(v => v !== '');
                        if (values.length > 0) {
                            options.push({ label: values[0].length > 4 ? 'Opção' : 'Tam', values });
                        }
                    }
                });
            }

            if (options.length > 0) {
                options.forEach(opt => {
                    const row = document.createElement('div');
                    row.className = 'space-y-4';
                    row.innerHTML = `
                        <p class="text-[10px] font-black uppercase tracking-widest text-slate-400 leading-none">${opt.label}</p>
                        <div class="flex flex-wrap gap-2">
                            ${opt.values.map(v => `
                                <button onclick="window.selectVariation('${opt.label}', '${v}', this)" 
                                        class="var-btn px-6 py-4 rounded-xl border-2 border-slate-100 dark:border-slate-700 font-bold text-sm transition-all active-scale hover:border-orange-500/30 touch-manipulation dark:text-white">
                                    ${v}
                                </button>
                            `).join('')}
                        </div>
                    `;
                    variationsCont.appendChild(row);
                });
            }

            options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <p class="text-[10px] font-black uppercase tracking-[0.2em] mb-4 text-slate-400">Escolha seu ${opt.label}</p>
                    <div class="flex flex-wrap gap-3">
                        ${opt.values.map(val => `
                            <button onclick="selectVariation('${opt.label}', '${val}', this)" class="var-btn border-2 border-slate-100 dark:border-slate-700/50 px-6 py-3.5 rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all hover:border-slate-300 dark:text-white active-scale">
                                ${val}
                            </button>
                        `).join('')}
                    </div>
                `;
                variationsCont.appendChild(div);
            });

            const addBtn = document.getElementById('modal-add-btn');
            addBtn.style.backgroundColor = storeData.primaryColor;
            
            const isService = storeData.type === 'servicos' || storeData.type === 'portfolio';
            addBtn.innerHTML = `<i data-lucide="${isService ? 'message-circle' : 'shopping-cart'}" class="w-5 h-5"></i> <span>${isService ? 'Solicitar via WhatsApp' : 'Adicionar ao Carrinho'}</span>`;
            
            addBtn.onclick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                const varsStr = Object.entries(currentVariations).map(([k, v]) => `${k}: ${v}`).join(', ');
                if (isService) {
                    requestQuote(productId, varsStr);
                } else {
                    addToCart(productId, currentVariations);
                    closeModal();
                }
            };

            modal.classList.add('open');
            overlay.classList.add('open');
            document.body.style.overflow = 'hidden'; // Previne scroll do fundo no mobile
            setTimeout(() => lucide.createIcons(), 50);
        }

        window.closeModal = function() {
            document.getElementById('product-modal').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
            document.body.style.overflow = '';
            // Limpa o container de mídia para parar vídeos se houver
            setTimeout(() => {
                if (!document.getElementById('product-modal').classList.contains('open')) {
                    document.getElementById('modal-media-container').innerHTML = '';
                }
            }, 300);
        }

        function updateDots(swiperId) {
            const swiper = document.getElementById(swiperId);
            const dotsCont = document.getElementById(`dots-${swiperId}`);
            if (!swiper || !dotsCont) return;
            
            const index = Math.round(swiper.scrollLeft / swiper.offsetWidth);
            const dots = dotsCont.querySelectorAll('div');
            dots.forEach((dot, i) => {
                if (i === index) {
                    dot.classList.remove('bg-white/40', 'border-transparent');
                    dot.classList.add('bg-white', 'border-black/10', 'w-3');
                } else {
                    dot.classList.remove('bg-white', 'border-black/10', 'w-3');
                    dot.classList.add('bg-white/40', 'border-transparent');
                }
            });
        }

        // Proxy de Imagem (Melhorado para Postimages e outros)
        function proxyImg(url) {
            if (!url) return '';
            let u = url.trim();
            
            // Se for base64, retorna direto
            if (u.startsWith('data:image')) return u;
            
            // Se for link do Firebase, não precisa de proxy
            if (u.includes('firebasestorage.')) return u;
            
            // Tratamento inteligente para Postimages
            if (u.includes('postimg.cc/')) {
                // Se o cliente colou o link da página (ex: postimg.cc/65sF32Sj)
                // Transformamos no link direto (ex: i.postimg.cc/65sF32Sj/image.jpg)
                if (!u.includes('i.postimg.cc/')) {
                    const parts = u.split('/');
                    const id = parts[parts.length - 1];
                    u = `https://i.postimg.cc/${id}/image.jpg`;
                }
            }
            
            // Tratamento para ImgBB
            if (u.includes('ibb.co/') && !u.includes('i.ibb.co/')) {
                u = u.replace('ibb.co/', 'i.ibb.co/') + '.png';
            }

            if (!u.startsWith('http')) u = 'https://' + u;
            return u;
        }

        function getEmbedUrl(url) {
            if (!url) return '';
            let u = url.trim();
            
            // YouTube
            if (u.includes('youtube.com/watch?v=') || u.includes('youtu.be/')) {
                const id = u.includes('watch?v=') ? u.split('v=')[1].split('&')[0] : u.split('youtu.be/')[1].split('?')[0];
                return `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&autoplay=0`;
            }
            if (u.includes('youtube.com/shorts/')) {
                const id = u.split('shorts/')[1].split('?')[0];
                return `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1&autoplay=0`;
            }
            
            // Instagram
            if (u.includes('instagram.com/')) {
                // Remove query strings e adiciona o sufixo de embed
                let cleanUrl = u.split('?')[0];
                if (!cleanUrl.endsWith('/')) cleanUrl += '/';
                return `${cleanUrl}embed/captioned/`;
            }
            
            // TikTok
            if (u.includes('tiktok.com/')) {
                // TikTok embed é mais complexo com iframes diretos, variamos pelo ID
                const parts = u.split('/');
                const id = parts[parts.length - 1].split('?')[0];
                return `https://www.tiktok.com/embed/v2/${id}`;
            }

            return u;
        }

        async function decodeData() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const storeId = urlParams.get('id');
                if (!storeId) return null;

                const { doc, getDoc } = window.firebaseUtils;
                const docSnap = await getDoc(doc(window.db, "stores", storeId));

                if (!docSnap.exists()) return null;

                const data = docSnap.data();
                console.log("Dados do Catálogo:", data);
                const result = {
                    name: data.n,
                    whatsapp: data.w,
                    address: data.a,
                    instagram: data.ig,
                    facebook: data.fb,
                    primaryColor: data.c.startsWith('#') ? data.c : '#' + data.c,
                    secondaryColor: data.b.startsWith('#') ? data.b : '#' + data.b,
                    bannerImage: data.bi,
                    type: data.t,
                    imageFormat: data.imf || 'vertical',
                    status: data.status || 'active',
                    expiresAt: data.expiresAt || data.createdAt,
                    vendors: data.v || [],
                    shippingZones: data.sh || [],
                    logo: data.lg || '',
                    pixKey: data.px || '',
                    products: (data.p || []).map(p => {
                        console.log(`Produto: ${p.n}, Imagem URL: ${p.i}`);
                        return {
                            id: p.id || Math.random().toString(36).substr(2, 9),
                            name: p.n,
                            price: p.p,
                            wholesalePrice: p.wp || '',
                            wholesaleMinQty: p.wq || '',
                            image: p.i,
                            videoUrl: p.v || '',
                            category: p.cat || '',
                            description: p.d || '',
                            available: p.av !== false,
                            featured: p.f === true,
                            vars: p.vars || ''
                        };
                    })
                };

                // Lógica de Traqueamento de Cliques do Vendedor
                const vendorCode = urlParams.get('v');
                if (vendorCode && data.v && data.v.length > 0) {
                    const vendorIndex = data.v.findIndex(v => v.code === vendorCode);
                    if (vendorIndex !== -1) {
                        try {
                            const newVendors = [...data.v];
                            newVendors[vendorIndex].clicks = (newVendors[vendorIndex].clicks || 0) + 1;
                            
                            const { updateDoc } = window.firebaseUtils;
                            const storeRef = doc(window.db, "stores", storeId);
                            await updateDoc(storeRef, { v: newVendors });
                            console.log(`Clique registrado para vendedor: ${vendorCode}`);
                            result.vendors = newVendors;
                        } catch (e) {
                            console.error("Erro ao registrar clique:", e);
                        }
                    }
                }

                return result;
            } catch (e) { 
                console.error("Erro ao buscar dados:", e);
                return null; 
            }
        }

        function formatCurrency(value) {
            const valStr = String(value || '').trim();
            if (!valStr || valStr === '0' || valStr === '0,00' || valStr === 'undefined' || valStr === 'null') {
                return 'Peça Orçamento';
            }
            const num = typeof value === 'string' ? parseFloat(value.replace(',', '.')) : value;
            if (isNaN(num) || num === 0) return 'Peça Orçamento';
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(num);
        }

        function toggleCart(open) {
            document.getElementById('cart-drawer').classList.toggle('open', open);
            document.getElementById('overlay').classList.toggle('open', open);
        }

        function addToCart(productId, variations = {}) {
            const product = storeData.products.find(p => p.id === productId);
            const varKey = JSON.stringify(variations);
            const existing = cart.find(item => item.id === productId && JSON.stringify(item.variations || {}) === varKey);
            
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1, variations });
            }
            updateCartUI();
            toggleCart(true);
        }

        function updateQuantity(id, delta, varKey) {
            const item = cart.find(i => i.id === id && JSON.stringify(i.variations || {}) === varKey);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    removeFromCart(id, varKey);
                } else {
                    updateCartUI();
                }
            }
        }

        function removeFromCart(id, varKey) {
            cart = cart.filter(i => !(i.id === id && JSON.stringify(i.variations || {}) === varKey));
            updateCartUI();
        }

        function updateCartUI() {
            const itemsContainer = document.getElementById('cart-items');
            const footerContainer = document.getElementById('cart-footer');
            const fab = document.getElementById('cart-fab');
            const countBadge = document.getElementById('cart-count');

            const totalItems = cart.reduce((acc, item) => acc + item.quantity, 0);
            countBadge.innerText = totalItems;
            fab.classList.toggle('hidden', totalItems === 0);
            fab.style.backgroundColor = storeData.primaryColor;

            if (cart.length === 0) {
                itemsContainer.innerHTML = '<p class="text-center text-slate-400">Carrinho vazio</p>';
                footerContainer.innerHTML = '';
            } else {
                let total = 0;
                itemsContainer.innerHTML = cart.map(item => {
                    const isWholesale = item.wholesaleMinQty && item.quantity >= item.wholesaleMinQty;
                    const priceToUse = isWholesale ? item.wholesalePrice : item.price;
                    const subtotal = parseFloat((priceToUse || '0').replace(',', '.')) * item.quantity;
                    total += subtotal;

                    const varKey = JSON.stringify(item.variations || {});
                    const varDisplay = Object.entries(item.variations || {}).map(([k, v]) => `${k}: ${v}`).join(' | ');

                    return `
                        <div class="flex gap-4 items-start bg-slate-50 dark:bg-slate-900 p-4 rounded-2xl border border-slate-100 dark:border-slate-700">
                            <img src="${proxyImg(item.image)}" class="w-16 h-16 rounded-lg object-cover" referrerpolicy="no-referrer">
                            <div class="flex-1">
                                <h4 class="font-bold text-sm line-clamp-1">${item.name}</h4>
                                ${varDisplay ? `<p class="text-[10px] text-slate-400 font-bold uppercase mb-1">${varDisplay}</p>` : ''}
                                <div class="flex items-center gap-2">
                                    <p class="text-xs font-bold" style="color: ${isWholesale ? '#f97316' : storeData.primaryColor}">${formatCurrency(priceToUse)}</p>
                                    ${isWholesale ? '<span class="text-[8px] bg-orange-100 dark:bg-orange-900/40 text-orange-600 px-1.5 py-0.5 rounded font-black uppercase">Atacado</span>' : ''}
                                </div>
                                <div class="flex items-center gap-2 mt-2">
                                    <button onclick="updateQuantity('${item.id}', -1, '${varKey}')" class="w-6 h-6 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded flex items-center justify-center">-</button>
                                    <span class="text-xs font-bold">${item.quantity}</span>
                                    <button onclick="updateQuantity('${item.id}', 1, '${varKey}')" class="w-6 h-6 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded flex items-center justify-center">+</button>
                                </div>
                            </div>
                            <button onclick="removeFromCart('${item.id}', '${varKey}')" class="text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>

                const shippingHTML = (storeData.shippingZones && storeData.shippingZones.length > 0) ? `

                        </select>
                    </div>
                ` : '';

                const shippingPrice = selectedShippingZone ? parseFloat(selectedShippingZone.price.replace(',', '.')) : 0;
                const grandTotal = total + shippingPrice;

                footerContainer.innerHTML = `

        function checkout() {
            let message = `*Novo Pedido - ${storeData.name}*\n\n`;
            
            // Adiciona vendedor se existir
            const urlParams = new URLSearchParams(window.location.search);
            const vendorCode = urlParams.get('v');

                const vendorObj = (storeData.vendors || []).find(v => v.code === vendorCode);
                message += `*Vendedor:* ${vendorObj ? vendorObj.name : vendorCode}\n\n`;
            }

            let total = 0;
            cart.forEach(item => {
                const isWholesale = item.wholesaleMinQty && item.quantity >= item.wholesaleMinQty;
                const priceToUse = isWholesale ? item.wholesalePrice : item.price;

                const vars = Object.entries(item.variations || {}).map(([k, v]) => `${k}: ${v}`).join(', ');

                        ${imageUrl ? `<img src="${imageUrl}" class="absolute inset-0 w-full h-full object-cover group-hover/card:scale-105 transition-transform duration-700">` : ''}
                        <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent opacity-0 group-hover/card:opacity-100 transition-opacity"></div>
                    </div>
                    <div class="p-3 sm:p-5 flex flex-col flex-1">
                        <span class="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1 leading-none truncate">${p.cat || 'Geral'}</span>
                        <h3 class="font-black text-sm sm:text-lg mb-2 line-clamp-2 leading-tight dark:text-white uppercase italic italic tracking-tighter">${p.n}</h3>
                        <div class="mt-auto">
                            <p class="font-black text-lg sm:text-2xl dark:text-white tracking-tighter leading-none" style="color: ${primaryColor}">${formatCurrency(price)}</p>
                            <div class="mt-4 w-full py-3 sm:py-4 text-white font-black rounded-xl text-[9px] sm:text-[10px] uppercase tracking-widest italic flex items-center justify-center gap-2 transition-all shadow-sm" style="background-color: ${primaryColor}">
                                <i data-lucide="plus" class="w-3 h-3"></i> Detalhes
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
            
            if (window.lucide) lucide.createIcons();
        }

        window.onload = async () => {
            // Aguarda o script do Lucide carregar se necessário
            if (!window.lucide) {
                await new Promise(r => setTimeout(r, 500));
            }
            
            // Aguarda um pouco para o Firebase inicializar
            let attempts = 0;
            while (!window.firebaseUtils && attempts < 50) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }
            
            storeData = await decodeData();
            if (storeData) window.fullCatalog = storeData.products;
            renderStore();
        };
    </script>
    <!-- ATENDENTE INTELIGENTE (IA LOCAL) -->
    <div id="ai-attendant" class="fixed bottom-24 left-4 right-4 sm:left-auto sm:right-6 z-[90] pointer-events-none opacity-0 transition-all duration-500 transform translate-y-10 hidden">
        <div class="bg-white dark:bg-slate-800 w-full sm:w-80 rounded-3xl shadow-2xl border border-slate-100 dark:border-slate-700 overflow-hidden pointer-events-auto">
            <!-- Header -->
            <div class="bg-slate-900 p-4 flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-[#25D366] rounded-full flex items-center justify-center animate-pulse">
                        <i data-lucide="bot" class="w-5 h-5 text-slate-900"></i>
                    </div>
                    <div>
                        <h4 class="text-white text-sm font-black uppercase italic leading-none">Atendente Virtual</h4>
                        <span class="text-[#25D366] text-[10px] font-bold uppercase tracking-wider">Online agora</span>
                    </div>
                </div>
                <button onclick="toggleAI(false)" class="text-slate-400 hover:text-white transition-colors active-scale">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <!-- Chat Area -->
            <div id="ai-messages" class="h-64 overflow-y-auto p-4 space-y-3 bg-slate-50 flex flex-col custom-scrollbar">
                <div class="bg-slate-200 text-slate-700 p-3 rounded-2xl rounded-tl-none text-[11px] font-medium self-start shadow-sm leading-relaxed">
                    Olá! Sou o assistente da loja. Posso te ajudar a encontrar algum produto? Experimente perguntar algo como "Tem camisa?" ou "Quais as formas de pagamento?".
                </div>
            </div>

            <!-- Input Area -->
            <div class="p-3 bg-white border-t border-slate-100 flex gap-2">
                <input type="text" id="ai-input" placeholder="Pergunte aqui..." class="flex-grow bg-slate-100 border-none rounded-xl px-4 py-3 text-[11px] font-bold focus:ring-2 focus:ring-[#25D366] outline-none">
                <button onclick="askAI()" class="bg-[#25D366] text-slate-900 p-3 rounded-xl hover:scale-105 active-scale transition-all">
                    <i data-lucide="send" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </div>

    <button id="ai-trigger" onclick="toggleAI(true)" class="hidden fixed bottom-32 left-6 sm:left-auto sm:right-6 z-50 bg-slate-900 dark:bg-slate-800 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-xl hover:scale-110 active-scale transition-all border-2 border-[#25D366] opacity-0 pointer-events-none">
        <i data-lucide="message-square" class="w-6 h-6 text-[#25D366]"></i>
    </button>

    <script>
        // Lógica do Atendente Inteligente
        let aiOpen = false;

        function toggleAI(show) {
            aiOpen = show;
            const widget = document.getElementById('ai-attendant');
            
            if(show) {
                widget.style.display = 'block';
                setTimeout(() => {
                    widget.classList.remove('opacity-0', 'translate-y-10', 'pointer-events-none');
                    document.getElementById('ai-input').focus();
                }, 10);
            } else {
                widget.classList.add('opacity-0', 'translate-y-10', 'pointer-events-none');
                setTimeout(() => { if(!aiOpen) widget.style.display = 'none'; }, 500);
            }
        }

        function appendMessage(text, type, productLink = null) {
            const messages = document.getElementById('ai-messages');
            const div = document.createElement('div');
            div.className = type === 'user' 
                ? 'bg-slate-900 text-white p-3 rounded-2xl rounded-tr-none text-xs font-bold self-end shadow-md max-w-[80%]'
                : 'bg-white border border-slate-200 text-slate-700 p-3 rounded-2xl rounded-tl-none text-xs font-medium self-start shadow-sm max-w-[80%] flex flex-col gap-2';
            
            const textSpan = document.createElement('span');
            textSpan.textContent = text;
            div.appendChild(textSpan);

            if(productLink) {
                const btn = document.createElement('button');
                btn.className = 'mt-1 bg-[#25D366] text-slate-900 text-[10px] font-black uppercase py-2 px-3 rounded-xl hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-1 shadow-sm';
                btn.innerHTML = `<i data-lucide="eye" class="w-3.5 h-3.5"></i> Abrir Produto`;
                btn.onclick = () => {
                    openProductModal(productLink.id);
                    toggleAI(false);
                };
                div.appendChild(btn);
                setTimeout(() => lucide.createIcons(), 0);
            }

            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function findResponse(query) {
            const queryLower = query.toLowerCase().trim();
            const products = window.fullCatalog || [];

            // 1. PRIORIDADE: Busca de Produtos
            const matches = products.filter(p => {
                const name = (p.name || '').toLowerCase();
                const desc = (p.description || '').toLowerCase();
                // Busca se o nome do produto está contido na pergunta ou vice-versa (mínimo 3 caracteres para evitar falsos positivos)
                return queryLower.length >= 3 && (name.includes(queryLower) || queryLower.includes(name));
            });

            if(matches.length > 0) {
                const p = matches[0];
                const price = typeof formatCurrency === 'function' ? formatCurrency(p.price) : `R$ ${p.price}`;
                return {
                    text: `Sim! Temos "${p.name}" por apenas ${price}. Clique no botão abaixo para ver as fotos e detalhes:`,
                    product: p
                };
            }

            // 2. FAQ (Banco de Conhecimento)
            const knowledgeBase = [
                {
                    keys: ['pagamento', 'paga', 'pix', 'cartao', 'cartão', 'dinheiro', 'taxa', 'parcela'],
                    response: "Aceitamos PIX, Dinheiro e Cartão. No cartão, aplicamos a taxa da maquininha. Você pode parcelar suas compras também!"
                },
                {
                    keys: ['entrega', 'frete', 'envia', 'recebe', 'chega', 'correio', 'retirada'],
                    response: "Entregamos em toda a região! O frete é calculado com base no seu endereço. Você também pode combinar a retirada se preferir."
                },
                {
                    keys: ['horario', 'aberto', 'funciona', 'atendimento', 'horas'],
                    response: "Nosso catálogo online funciona 24h! Para suporte humano via WhatsApp, atendemos em horário comercial."
                },
                {
                    keys: ['confiavel', 'seguro', 'golpe', 'garantia'],
                    response: "Sim! Somos uma loja verificada. Você faz o pedido pelo catálogo e finaliza o pagamento diretamente com o vendedor via WhatsApp."
                },
                {
                    keys: ['tamanho', 'medida', 'p', 'm', 'g', 'gg', 'numero'],
                    response: "Trabalhamos com diversos tamanhos. Você pode ver os detalhes na descrição de cada produto clicando sobre a foto."
                }
            ];

            // Busca no FAQ com precisão (evita que 'g' de 'gravação' ative o FAQ de tamanhos)
            for (const item of knowledgeBase) {
                if (item.keys.some(key => {
                    if (key.length <= 2) {
                        // Para chaves curtas como p, g, m, usa regex de palavra inteira
                        const regex = new RegExp(`\\b${key}\\b`, 'i');
                        return regex.test(queryLower);
                    }
                    return queryLower.includes(key);
                })) {
                    return { text: item.response };
                }
            }

            // 3. Navegação
            if(queryLower.includes('ver tudo') || queryLower.includes('loja') || queryLower.includes('catalogo') || queryLower.includes('catálogo')) {
                return { text: "Você pode navegar pelas categorias no topo da página para ver todos os nossos produtos!" };
            }

            return { text: "Ainda não tenho essa informação, mas se digitar o nome de um produto, eu tento encontrar para você! Também sei sobre pagamentos e entregas." };
        }

        async function askAI() {
            const input = document.getElementById('ai-input');
            const query = input.value.trim();
            if(!query) return;

            appendMessage(query, 'user');
            input.value = '';

            setTimeout(() => {
                const responseObj = findResponse(query);
                appendMessage(responseObj.text, 'bot', responseObj.product);
            }, 400);
        }

        // Mostrar o botão após carregar
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('ai-trigger').classList.remove('opacity-0', 'pointer-events-none');
                lucide.createIcons();
            }, 2000);
        });

        // Enviar com Enter
        document.getElementById('ai-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') askAI();
        });
    </script>
</body>
</html>
