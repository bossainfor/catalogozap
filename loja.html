<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carregando Catálogo...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .cart-drawer { transform: translateX(100%); transition: transform 0.3s ease-in-out; }
        .cart-drawer.open { transform: translateX(0); }
        .overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .overlay.open { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="bg-white text-slate-900">
    <div id="app">
        <!-- O conteúdo será injetado pelo JavaScript -->
        <div class="min-h-screen flex items-center justify-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500"></div>
        </div>
    </div>

    <!-- Overlay do Carrinho -->
    <div id="overlay" class="overlay fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50" onclick="toggleCart(false)"></div>
    
    <!-- Drawer do Carrinho -->
    <div id="cart-drawer" class="cart-drawer fixed top-0 right-0 h-full w-full max-w-md bg-white z-50 shadow-2xl flex flex-col">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <i data-lucide="shopping-cart" class="text-orange-500"></i>
                <h2 id="cart-title" class="text-xl font-black uppercase italic tracking-tighter">Seu Carrinho</h2>
            </div>
            <button onclick="toggleCart(false)" class="p-2 hover:bg-slate-100 rounded-full transition-colors">
                <i data-lucide="x"></i>
            </button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6">
            <!-- Itens do carrinho aqui -->
        </div>
        <div id="cart-footer" class="p-6 border-t border-slate-100 bg-slate-50 space-y-4">
            <!-- Total e Checkout aqui -->
        </div>
    </div>

    <!-- Botão Flutuante -->
    <button id="cart-fab" onclick="toggleCart(true)" class="hidden fixed bottom-8 right-8 text-white p-5 rounded-full shadow-2xl z-40 flex items-center justify-center">
        <i data-lucide="shopping-cart" size="28"></i>
        <span id="cart-count" class="absolute -top-2 -right-2 bg-slate-900 text-white text-xs font-bold w-7 h-7 rounded-full flex items-center justify-center border-2 border-white">0</span>
    </button>

    <script>
        let storeData = null;
        let cart = [];

        function decodeData() {
            try {
                const hash = window.location.hash.substring(1);
                if (!hash) throw new Error("Nenhum dado encontrado");
                const json = decodeURIComponent(escape(atob(hash)));
                return JSON.parse(json);
            } catch (e) {
                console.error("Erro ao decodificar:", e);
                return null;
            }
        }

        function formatCurrency(value) {
            const num = typeof value === 'string' ? parseFloat(value.replace(',', '.')) : value;
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(num || 0);
        }

        function toggleCart(open) {
            document.getElementById('cart-drawer').classList.toggle('open', open);
            document.getElementById('overlay').classList.toggle('open', open);
        }

        function addToCart(productId) {
            const product = storeData.products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            updateCartUI();
            toggleCart(true);
        }

        function updateQuantity(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.quantity = Math.max(1, item.quantity + delta);
            }
            updateCartUI();
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const itemsContainer = document.getElementById('cart-items');
            const footerContainer = document.getElementById('cart-footer');
            const fab = document.getElementById('cart-fab');
            const countBadge = document.getElementById('cart-count');

            const totalItems = cart.reduce((acc, item) => acc + item.quantity, 0);
            countBadge.innerText = totalItems;
            fab.classList.toggle('hidden', totalItems === 0);
            fab.style.backgroundColor = storeData.primaryColor;

            if (cart.length === 0) {
                itemsContainer.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center text-slate-400 gap-4">
                        <i data-lucide="shopping-bag" size="48"></i>
                        <p class="font-medium">Seu carrinho está vazio</p>
                    </div>
                `;
                footerContainer.innerHTML = '';
                lucide.createIcons();
                return;
            }

            itemsContainer.innerHTML = cart.map(item => `
                <div class="flex gap-4 items-start">
                    <div class="w-20 h-20 bg-slate-50 rounded-2xl overflow-hidden flex-shrink-0">
                        <img src="${item.image || 'https://picsum.photos/seed/'+item.id+'/200/200'}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-slate-900 leading-tight mb-1">${item.name}</h4>
                        <p class="font-bold text-sm mb-3" style="color: ${storeData.primaryColor}">${formatCurrency(item.price)}</p>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-3 bg-slate-100 rounded-lg p-1">
                                <button onclick="updateQuantity('${item.id}', -1)" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-md transition-colors"><i data-lucide="minus" size="14"></i></button>
                                <span class="font-bold text-sm w-4 text-center">${item.quantity}</span>
                                <button onclick="updateQuantity('${item.id}', 1)" class="w-8 h-8 flex items-center justify-center hover:bg-white rounded-md transition-colors"><i data-lucide="plus" size="14"></i></button>
                            </div>
                            <button onclick="removeFromCart('${item.id}')" class="text-red-500 p-2 hover:bg-red-50 rounded-lg transition-colors"><i data-lucide="trash-2" size="18"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((acc, item) => acc + (parseFloat(item.price.replace(',', '.')) * item.quantity), 0);
            footerContainer.innerHTML = `
                <div class="flex justify-between items-center mb-4">
                    <span class="text-slate-500 font-bold uppercase text-xs tracking-widest">Subtotal</span>
                    <span class="text-2xl font-black text-slate-900">${formatCurrency(total)}</span>
                </div>
                <button onclick="checkout()" class="w-full py-5 text-white font-black uppercase tracking-widest rounded-2xl flex items-center justify-center gap-3 transition-all shadow-xl" style="background-color: ${storeData.primaryColor}">
                    <i data-lucide="send"></i> Finalizar Pedido
                </button>
            `;
            lucide.createIcons();
        }

        function checkout() {
            let message = `*Novo Pedido - ${storeData.name}*\n\n*Itens:*\n`;
            cart.forEach(item => {
                message += `- ${item.quantity}x ${item.name} (${formatCurrency(item.price)} cada)\n`;
            });
            const total = cart.reduce((acc, item) => acc + (parseFloat(item.price.replace(',', '.')) * item.quantity), 0);
            message += `\n*Total: ${formatCurrency(total)}*`;
            window.open(`https://wa.me/55${storeData.whatsapp}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function renderStore() {
            const app = document.getElementById('app');
            if (!storeData) {
                app.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center p-4 text-center">
                        <i data-lucide="alert-circle" class="text-red-500 w-16 h-16 mb-4"></i>
                        <h1 class="text-2xl font-bold mb-2">Página não encontrada</h1>
                        <p class="text-slate-500 mb-6">O link que você acessou parece estar quebrado ou incompleto.</p>
                        <a href="criar.html" class="bg-orange-500 text-white px-8 py-3 rounded-xl font-bold">Criar meu Catálogo</a>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            document.title = storeData.name;
            const niche = storeData.type || 'loja';
            
            let productsHTML = '';
            if (niche === 'cardapio') {
                productsHTML = `<div class="max-w-3xl mx-auto space-y-6">` + storeData.products.map(p => `
                    <div class="flex gap-4 bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                        <img src="${p.image || 'https://picsum.photos/seed/'+p.id+'/200/200'}" class="w-24 h-24 rounded-xl object-cover">
                        <div class="flex-1 flex flex-col justify-between">
                            <div>
                                <h3 class="font-bold text-slate-900">${p.name}</h3>
                                <p class="text-sm font-black mt-1" style="color: ${storeData.primaryColor}">${formatCurrency(p.price)}</p>
                            </div>
                            <button onclick="addToCart('${p.id}')" class="self-start px-4 py-2 text-white text-xs font-bold rounded-lg" style="background-color: ${storeData.primaryColor}">Adicionar</button>
                        </div>
                    </div>
                `).join('') + `</div>`;
            } else if (niche === 'servicos') {
                productsHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">` + storeData.products.map(p => `
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex flex-col">
                        <img src="${p.image || 'https://picsum.photos/seed/'+p.id+'/400/300'}" class="h-48 rounded-2xl object-cover mb-4">
                        <h3 class="text-xl font-bold text-slate-900 mb-2">${p.name}</h3>
                        <p class="text-lg font-black mb-6" style="color: ${storeData.primaryColor}">${formatCurrency(p.price)}</p>
                        <button onclick="addToCart('${p.id}')" class="mt-auto w-full py-4 text-white font-bold rounded-xl" style="background-color: ${storeData.primaryColor}">Solicitar Agendamento</button>
                    </div>
                `).join('') + `</div>`;
            } else if (niche === 'portfolio') {
                productsHTML = `<div class="columns-1 sm:columns-2 lg:columns-3 gap-6 space-y-6">` + storeData.products.map(p => `
                    <div class="break-inside-avoid bg-white rounded-2xl overflow-hidden border border-slate-100 shadow-sm group relative">
                        <img src="${p.image || 'https://picsum.photos/seed/'+p.id+'/400/600'}" class="w-full h-auto object-cover">
                        <div class="absolute inset-0 bg-black/40 opacity-0 hover:opacity-100 transition-opacity flex items-center justify-center">
                            <button onclick="addToCart('${p.id}')" class="bg-white text-slate-900 px-6 py-2 rounded-full font-bold text-sm">Tenho Interesse</button>
                        </div>
                        <div class="p-4"><h3 class="font-bold text-slate-900">${p.name}</h3></div>
                    </div>
                `).join('') + `</div>`;
            } else {
                productsHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">` + storeData.products.map(p => `
                    <div class="flex flex-col bg-white rounded-3xl overflow-hidden border border-slate-100 hover:shadow-2xl transition-all">
                        <div class="aspect-square bg-slate-50 relative overflow-hidden">
                            <img src="${p.image || 'https://picsum.photos/seed/'+p.id+'/400/400'}" class="w-full h-full object-cover">
                            <div class="absolute top-4 right-4 bg-white/95 px-4 py-1.5 rounded-full text-sm font-black text-slate-900 shadow-md">${formatCurrency(p.price)}</div>
                        </div>
                        <div class="p-6 flex flex-col flex-1">
                            <h3 class="text-lg font-bold text-slate-900 mb-4 line-clamp-2">${p.name}</h3>
                            <button onclick="addToCart('${p.id}')" class="mt-auto w-full py-4 text-white font-black text-sm uppercase rounded-2xl" style="background-color: ${storeData.primaryColor}">Adicionar ao Carrinho</button>
                        </div>
                    </div>
                `).join('') + `</div>`;
            }

            app.innerHTML = `
                <div class="min-h-screen bg-white">
                    <div class="relative py-16 px-4 text-center overflow-hidden" style="background-color: ${storeData.secondaryColor}; color: #ffffff">
                        ${storeData.bannerImage ? `<img src="${storeData.bannerImage}" class="absolute inset-0 w-full h-full object-cover opacity-40 z-0">` : ''}
                        <div class="relative z-10">
                            <h1 class="text-4xl sm:text-6xl font-black tracking-tighter mb-4 italic uppercase drop-shadow-lg">${storeData.name}</h1>
                            <div class="inline-flex items-center gap-2 bg-white/20 backdrop-blur-md px-5 py-2 rounded-full text-sm font-bold border border-white/20">
                                <i data-lucide="smartphone" size="16" style="color: ${storeData.primaryColor}"></i>
                                <span>${niche === 'servicos' ? 'Agende via WhatsApp' : niche === 'portfolio' ? 'Contato via WhatsApp' : 'Pedidos via WhatsApp'}</span>
                            </div>
                        </div>
                    </div>
                    <main class="max-w-6xl mx-auto px-4 py-12 pb-32">
                        ${productsHTML}
                    </main>
                    <footer class="py-12 border-t border-slate-100 bg-slate-50 text-center">
                        <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">${storeData.name}</p>
                        <p class="text-xs text-slate-400">Pedidos via WhatsApp • ${storeData.whatsapp}</p>
                    </footer>
                </div>
            `;
            lucide.createIcons();
        }

        window.onload = () => {
            storeData = decodeData();
            renderStore();
        };
    </script>
</body>
</html>
